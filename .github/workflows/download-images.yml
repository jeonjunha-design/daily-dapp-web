name: 이미지 다운로드

on:
  workflow_dispatch:
    inputs:
      images:
        description: "이미지 목록 (파일명=URL, 줄바꿈 구분)"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 다운로드 및 커밋
        env:
          IMAGES: ${{ github.event.inputs.images }}
        run: |
          mkdir -p images
          python3 - <<EOF
import urllib.request, os, time
imgs = os.environ.get("IMAGES","")
hdr = {"User-Agent":"Mozilla/5.0","Referer":"https://en.wikipedia.org/"}
for line in imgs.strip().splitlines():
    if "=" not in line: continue
    fname,url = line.split("=",1)
    fname,url = fname.strip(),url.strip()
    try:
        time.sleep(1)
        data = urllib.request.urlopen(urllib.request.Request(url,headers=hdr),timeout=15).read()
        open("images/"+fname,"wb").write(data)
        print("OK "+fname+" "+str(len(data)//1024)+"KB")
    except Exception as e:
        print("ERR "+fname+" "+str(e))
EOF
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add images/
          git diff --staged --quiet || git commit -m "이미지 추가 $(date +%Y-%m-%d)"
          git push
