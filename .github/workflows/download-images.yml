name: 이미지 다운로드
on:
  workflow_dispatch:
    inputs:
      images:
        description: "파일명=URL##파일명=URL 형식 (##으로 구분)"
        required: true
        type: string
jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: 다운로드
        env:
          IMAGES: ${{ github.event.inputs.images }}
        run: |
          mkdir -p images
          echo '' | base64 -d > /tmp/dl.py
          python3 /tmp/dl.py
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add images/
          git diff --staged --quiet || git commit -m "이미지 추가"
          git push
