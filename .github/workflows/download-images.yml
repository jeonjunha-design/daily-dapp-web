name: 이미지 다운로드

on:
  workflow_dispatch:
    inputs:
      images:
        description: '이미지 목록 (파일명=URL 형식, 줄바꿈으로 구분)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 이미지 다운로드
        env:
          IMAGES: ${{ github.event.inputs.images }}
        run: |
          mkdir -p images
          echo "$IMAGES" > /tmp/imglist.txt
          python3 /tmp/dl.py

      - name: 다운로드 스크립트 생성 및 실행
        run: |
          cat > /tmp/dl.py << 'PY'
import urllib.request, os, time
headers = {'User-Agent': 'Mozilla/5.0', 'Referer': 'https://en.wikipedia.org/'}
with open('/tmp/imglist.txt') as f:
    lines = f.read().strip().splitlines()
for line in lines:
    line = line.strip()
    if '=' not in line: continue
    fname, url = line.split('=', 1)
    fname, url = fname.strip(), url.strip()
    if not fname or not url: continue
    try:
        time.sleep(1)
        req = urllib.request.Request(url, headers=headers)
        with urllib.request.urlopen(req, timeout=15) as r:
            data = r.read()
        open(f'images/{fname}', 'wb').write(data)
        print(f'OK {fname}: {len(data)//1024}KB')
    except Exception as e:
        print(f'ERR {fname}: {e}')
PY

      - name: 이미지 최적화
        run: |
          pip install Pillow -q
          python3 -c "
import os
from PIL import Image
for fname in os.listdir('images'):
    if not fname.endswith('.jpg'): continue
    path = f'images/{fname}'
    if os.path.getsize(path) > 2*1024*1024:
        img = Image.open(path)
        img.thumbnail((1200,1200))
        img.save(path, quality=85, optimize=True)
        print(f'최적화: {fname}')
"

      - name: GitHub에 커밋
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add images/
          git diff --staged --quiet || git commit -m "이미지 자동 추가 $(date '+%Y-%m-%d')"
          git push

