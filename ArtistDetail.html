<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화가 작품 · Daily-Dapp</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans+KR:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1318;
      --bg2: #1a2030;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f0f4f8;
      --muted: #8896a8;
      --dim: #4a5568;
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.12);
      --gold-glow: rgba(201,168,76,0.2);
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    /* ── 헤더 ── */
    .header {
      position: fixed; top: 0; inset-inline: 0; height: 60px;
      background: rgba(15,19,24,0.85);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
      z-index: 100; display: flex; align-items: center;
    }
    .header-inner {
      max-width: 900px; margin: 0 auto; width: 100%;
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      color: var(--muted); text-decoration: none; font-size: 14px;
      display: flex; align-items: center; gap: 6px; transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }
    .lang-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--muted); font-size: 13px; font-weight: 600;
      padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ── 메인 레이아웃 ── */
    .main { height: calc(100vh - 60px); margin-top: 60px; display: flex; flex-direction: column; overflow: hidden; }

    /* ── 이미지 영역 ── */
    .artwork-image-wrap {
      position: relative; flex: 1; background: #08090c;
      display: flex; align-items: center; justify-content: center; overflow: hidden; min-height: 0;
    }
    .artwork-image-wrap img {
      max-width: 100%; max-height: 100%; object-fit: contain;
      display: block; transition: opacity 0.4s ease; cursor: zoom-in;
    }
    .artwork-image-wrap img.hidden { opacity: 0; }
    .img-skeleton {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, #1a2030 25%, #222d40 50%, #1a2030 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .img-skeleton.hidden { display: none; }

    /* 작가 배지 */
    .artist-badge {
      position: absolute; top: 12px; left: 12px; z-index: 5;
      background: rgba(15,19,24,0.8); border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold); font-size: 12px; font-weight: 700;
      padding: 6px 14px; border-radius: 20px;
      backdrop-filter: blur(8px);
    }

    /* ── 하단 정보 바 ── */
    .info-bar {
      flex-shrink: 0;
      background: rgba(15,19,24,0.95);
      border-top: 1px solid var(--border);
      padding: 14px 20px 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .info-bar.hidden { display: none; }

    .tts-progress { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .tts-progress-bar { height: 100%; background: var(--gold); border-radius: 1px; width: 0%; transition: width 0.3s linear; }

    .info-row { display: flex; align-items: center; gap: 10px; }
    .artwork-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(14px, 2vw, 19px); font-weight: 700; color: #fff;
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tts-icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--gold); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0; transition: all 0.2s;
      box-shadow: 0 2px 10px var(--gold-glow);
    }
    .tts-icon-btn:hover { transform: scale(1.1); }
    .tts-icon-btn.playing { background: #f59e0b; }

    .nav-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .nav-icon-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--muted); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .nav-icon-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    .meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .artwork-date { font-size: 12px; color: var(--dim); }
    .artwork-medium { font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

    /* ── 전체화면 ── */
    .fullscreen-modal {
      display: none; position: fixed; inset: 0; z-index: 999; background: #000;
    }
    .fullscreen-modal.show { display: block; }
    .fullscreen-modal img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; user-select: none;
    }
    .fs-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.88));
      padding: 40px 24px 24px; z-index: 10;
      transition: opacity 0.3s, transform 0.3s;
    }
    .fs-info.hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }
    .fs-title { font-family: 'Playfair Display', serif; font-size: clamp(15px,2.5vw,22px); font-weight: 700; color: #fff; margin-bottom: 4px; }
    .fs-meta { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
    .fs-desc { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    @media (max-width: 600px) {
      .info-bar { padding: 12px 14px 10px; }
      .artwork-medium { display: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="ArtistList.html" class="back-btn" id="backBtn">← <span id="backLabel">화가 목록</span></a>
      <span id="headerArtist" style="font-family:'Playfair Display',serif;font-size:15px;color:var(--gold)"></span>
      <button class="lang-btn" id="langToggle">🌐 EN</button>
    </div>
  </header>

  <main class="main">
    <div class="artwork-image-wrap">
      <div class="img-skeleton" id="imgSkeleton"></div>
      <img id="artImage" class="hidden" src="" alt="" />
      <div class="artist-badge" id="artistBadge"></div>
    </div>

    <div class="info-bar hidden" id="infoBar">
      <div class="tts-progress"><div class="tts-progress-bar" id="ttsBar"></div></div>
      <div class="info-row">
        <div class="artwork-title" id="artTitle">—</div>
        <button class="tts-icon-btn" id="ttsBtn">▶</button>
        <div class="nav-group">
          <button class="nav-icon-btn" id="prevBtn">‹</button>
          <button class="nav-icon-btn" id="nextBtn">›</button>
        </div>
      </div>
      <div class="meta-row">
        <span class="artwork-date" id="artDate"></span>
        <span class="artwork-medium" id="artMedium"></span>
      </div>
    </div>
  </main>

  <!-- 전체화면 -->
  <div class="fullscreen-modal" id="fullscreenModal">
    <img id="fullscreenImg" src="" alt="" />
    <div class="fs-info" id="fsInfo">
      <div class="fs-title" id="fsTitle"></div>
      <div class="fs-meta" id="fsMeta"></div>
      <div class="fs-desc" id="fsDesc"></div>
    </div>
  </div>

  <script>
    let currentLang = 'ko';
    let artworks = [];
    let currentIndex = 0;
    let ttsUtterance = null;
    let ttsPlaying = false;
    let ttsProgressTimer = null;
    let ttsStartTime = 0;
    let ttsDuration = 0;
    let artistKey = '';
    let artistInfo = {};

    const GITHUB_RAW = 'https://raw.githubusercontent.com/jeonjunha-design/daily-dapp-web/main/images/';

    const i18n = {
      ko: { back: '화가 목록', langBtn: '🌐 EN', ttsReady: '재생 버튼을 눌러 해설을 들어보세요', ttsPlaying: '재생 중...', ttsDone: '재생 완료' },
      en: { back: 'Artists', langBtn: '🌐 KO', ttsReady: 'Press play to listen', ttsPlaying: 'Playing...', ttsDone: 'Done' }
    };

    // URL 파라미터
    const params = new URLSearchParams(location.search);
    artistKey = params.get('artist') || '';
    const saved = (() => { try { return localStorage.getItem('daily_lang'); } catch(e) { return null; } })();
    currentLang = params.get('lang') || saved || 'ko';

    function imageUrl(artwork) {
      return GITHUB_RAW + artwork.file;
    }

    function stopTTS() {
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      ttsPlaying = false;
      clearInterval(ttsProgressTimer);
      const btn = document.getElementById('ttsBtn');
      if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
      const bar = document.getElementById('ttsBar');
      if (bar) bar.style.width = '0%';
    }

    function startTTS() {
      if (!window.speechSynthesis) return;
      const artwork = artworks[currentIndex];
      if (!artwork) return;

      const title = artwork.title || '';
      const date = artwork.date || '';
      const medium = artwork.medium || '';

      let text = '';
      if (currentLang === 'ko') {
        text = `${title}. ${date}년경에 제작된 작품입니다. ${medium ? medium + ' 기법을 사용했습니다.' : ''}`;
      } else {
        text = `${title}. ${date ? 'Created around ' + date + '.' : ''} ${medium ? 'Medium: ' + medium + '.' : ''}`;
      }

      window.speechSynthesis.cancel();
      ttsUtterance = new SpeechSynthesisUtterance(text.trim());
      ttsUtterance.lang = currentLang === 'ko' ? 'ko-KR' : 'en-US';
      ttsUtterance.rate = currentLang === 'ko' ? 0.9 : 0.95;

      ttsUtterance.onstart = () => {
        ttsPlaying = true;
        document.getElementById('ttsBtn').textContent = '⏸';
        document.getElementById('ttsBtn').classList.add('playing');
        ttsStartTime = Date.now();
        ttsDuration = (text.length / 4.5) * (1000 / 0.9);
        clearInterval(ttsProgressTimer);
        ttsProgressTimer = setInterval(() => {
          const pct = Math.min(((Date.now() - ttsStartTime) / ttsDuration) * 100, 99);
          document.getElementById('ttsBar').style.width = pct + '%';
        }, 200);
      };
      ttsUtterance.onend = () => {
        ttsPlaying = false;
        clearInterval(ttsProgressTimer);
        document.getElementById('ttsBtn').textContent = '▶';
        document.getElementById('ttsBtn').classList.remove('playing');
        document.getElementById('ttsBar').style.width = '100%';
        setTimeout(() => {
          document.getElementById('ttsBar').style.width = '0%';
          currentIndex = (currentIndex + 1) % artworks.length;
          renderArtwork();
          setTimeout(() => startTTS(), 800);
        }, 600);
      };
      ttsUtterance.onerror = () => {
        ttsPlaying = false;
        document.getElementById('ttsBtn').textContent = '▶';
        document.getElementById('ttsBtn').classList.remove('playing');
      };
      window.speechSynthesis.speak(ttsUtterance);
    }

    function renderArtwork() {
      const artwork = artworks[currentIndex];
      if (!artwork) return;

      const infoBar = document.getElementById('infoBar');
      const imgSkeleton = document.getElementById('imgSkeleton');
      const artImage = document.getElementById('artImage');

      infoBar.classList.add('hidden');
      imgSkeleton.classList.remove('hidden');
      artImage.classList.add('hidden');

      document.getElementById('artTitle').textContent = artwork.title || '—';
      document.getElementById('artDate').textContent = artwork.date || '';
      document.getElementById('artMedium').textContent = artwork.medium || '';

      const preloader = new Image();
      preloader.onload = () => {
        artImage.src = preloader.src;
        imgSkeleton.classList.add('hidden');
        artImage.classList.remove('hidden');
        infoBar.classList.remove('hidden');

        const fsModal = document.getElementById('fullscreenModal');
        if (fsModal.classList.contains('show')) {
          document.getElementById('fullscreenImg').src = preloader.src;
          document.getElementById('fsTitle').textContent = artwork.title || '';
          document.getElementById('fsMeta').textContent = [artistInfo.display_name, artwork.date].filter(Boolean).join(' · ');
        }
      };
      preloader.onerror = () => {
        imgSkeleton.classList.add('hidden');
        infoBar.classList.remove('hidden');
      };
      preloader.src = imageUrl(artwork);
    }

    // 전체화면
    const modal = document.getElementById('fullscreenModal');
    const fsInfo = document.getElementById('fsInfo');
    let fsInfoVisible = true;

    function openFullscreen() {
      const artwork = artworks[currentIndex];
      document.getElementById('fullscreenImg').src = imageUrl(artwork);
      document.getElementById('fsTitle').textContent = artwork.title || '';
      document.getElementById('fsMeta').textContent = [artistInfo.display_name, artwork.date].filter(Boolean).join(' · ');
      document.getElementById('fsDesc').textContent = artwork.medium || '';
      fsInfo.classList.remove('hidden');
      fsInfoVisible = true;
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    function closeFullscreen() {
      modal.classList.remove('show');
      document.body.style.overflow = '';
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }

    document.getElementById('artImage').onclick = openFullscreen;

    let touchStartX = 0, touchStartY = 0, touchMoved = false;
    modal.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchMoved = false;
    }, { passive: true });
    modal.addEventListener('touchmove', () => { touchMoved = true; }, { passive: true });
    modal.addEventListener('touchend', (e) => {
      const dx = touchStartX - e.changedTouches[0].clientX;
      const dy = touchStartY - e.changedTouches[0].clientY;
      if (!touchMoved || (Math.abs(dx) < 10 && Math.abs(dy) < 10)) {
        closeFullscreen();
      } else if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        const wasPlaying = ttsPlaying;
        stopTTS();
        currentIndex = (dx > 0 ? currentIndex + 1 : currentIndex - 1 + artworks.length) % artworks.length;
        renderArtwork();
        if (wasPlaying) setTimeout(() => startTTS(), 800);
      } else if (Math.abs(dy) > 40) {
        if (dy > 0) { fsInfoVisible = true; fsInfo.classList.remove('hidden'); }
        else { fsInfoVisible = false; fsInfo.classList.add('hidden'); }
      }
    }, { passive: true });

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) { modal.classList.remove('show'); document.body.style.overflow = ''; }
    });

    // 버튼 이벤트
    document.getElementById('ttsBtn').onclick = () => {
      if (!window.speechSynthesis) return;
      if (ttsPlaying) {
        window.speechSynthesis.pause();
        ttsPlaying = false;
        clearInterval(ttsProgressTimer);
        document.getElementById('ttsBtn').textContent = '▶';
        document.getElementById('ttsBtn').classList.remove('playing');
      } else if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
        ttsPlaying = true;
        document.getElementById('ttsBtn').textContent = '⏸';
        document.getElementById('ttsBtn').classList.add('playing');
      } else {
        startTTS();
      }
    };

    document.getElementById('prevBtn').onclick = () => {
      const wasPlaying = ttsPlaying; stopTTS();
      currentIndex = (currentIndex - 1 + artworks.length) % artworks.length;
      renderArtwork();
      if (wasPlaying) setTimeout(() => startTTS(), 800);
    };
    document.getElementById('nextBtn').onclick = () => {
      const wasPlaying = ttsPlaying; stopTTS();
      currentIndex = (currentIndex + 1) % artworks.length;
      renderArtwork();
      if (wasPlaying) setTimeout(() => startTTS(), 800);
    };

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeFullscreen();
      else if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
      else if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
      else if (e.key === 'ArrowUp' && modal.classList.contains('show')) { fsInfoVisible = true; fsInfo.classList.remove('hidden'); }
      else if (e.key === 'ArrowDown' && modal.classList.contains('show')) { fsInfoVisible = false; fsInfo.classList.add('hidden'); }
    });

    document.getElementById('langToggle').onclick = () => {
      currentLang = currentLang === 'ko' ? 'en' : 'ko';
      document.getElementById('langToggle').textContent = i18n[currentLang].langBtn;
      document.getElementById('backLabel').textContent = i18n[currentLang].back;
      try { localStorage.setItem('daily_lang', currentLang); } catch(e) {}
    };

    // 페이지 이탈 시 TTS 종료
    document.addEventListener('visibilitychange', () => { if (document.hidden) stopTTS(); });
    window.addEventListener('pagehide', () => stopTTS());

    // 초기 로드
    async function init() {
      if (!artistKey) { location.href = 'ArtistList.html'; return; }

      // 배지 설정
      document.getElementById('artistBadge').textContent = '🖼️ ' + decodeURIComponent(artistKey);

      try {
        // artist_collections.json 로드
        const colRes = await fetch('artist_collections.json');
        const collections = await colRes.json();
        const ids = collections[artistKey] || [];

        // artist_details.json 로드
        try {
          const detRes = await fetch('artist_details.json');
          const details = await detRes.json();
          artistInfo = details[artistKey] || { display_name: artistKey, artworks: [] };
        } catch(e) {
          artistInfo = { display_name: artistKey, artworks: [] };
        }

        document.getElementById('headerArtist').textContent = artistInfo.display_name || artistKey;
        document.getElementById('artistBadge').textContent = `🎨 ${artistInfo.display_name || artistKey}`;

        // 작품 목록 구성
        if (artistInfo.artworks && artistInfo.artworks.length > 0) {
          artworks = artistInfo.artworks;
        } else {
          artworks = ids.map(id => ({
            id, title: '', date: '', medium: '',
            file: `artist_${id}.jpg`
          }));
        }

        if (artworks.length === 0) {
          document.getElementById('imgSkeleton').classList.add('hidden');
          return;
        }

        // 셔플
        for (let i = artworks.length-1; i>0; i--) {
          const j = Math.floor(Math.random()*(i+1));
          [artworks[i], artworks[j]] = [artworks[j], artworks[i]];
        }

        renderArtwork();
      } catch(e) {
        console.error(e);
        document.getElementById('imgSkeleton').classList.add('hidden');
      }
    }

    init();
  </script>
</body>
</html>
