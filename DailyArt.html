<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 미술 작품 · Daily-Dapp</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main: #141923;
      --bg-sub: #1e2533;
      --bg-card: rgba(255,255,255,0.05);
      --text-dark: #f8fafc;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --border: rgba(255,255,255,0.09);
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.15);
      --green-glow: rgba(52,211,153,0.25);
      --brand-blue: #3182f6;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-main);
      color: var(--text-dark);
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 헤더 ── */
    .header {
      position: fixed; top: 0; inset-inline: 0; height: 60px;
      background: rgba(20,25,35,0.75);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex; align-items: center;
    }
    .header-inner {
      max-width: 900px; margin: 0 auto; width: 100%;
      padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text-dark); }
    .header-logo {
      font-size: 15px; font-weight: 700; color: var(--green);
      letter-spacing: 0.5px;
    }
    .lang-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 13px; font-weight: 600;
      padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-dark); }

    /* ── 메인 레이아웃 ── */
    .main {
      max-width: 900px; margin: 0 auto;
      padding: 100px 24px 80px;
    }

    /* ── 날짜 배지 ── */
    .date-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--green-dim); border: 1px solid rgba(52,211,153,0.3);
      color: var(--green); font-size: 12px; font-weight: 700;
      padding: 6px 14px; border-radius: 20px; letter-spacing: 0.5px;
      margin-bottom: 28px;
    }
    .date-badge::before { content: '🎨'; font-size: 13px; }

    /* ── 작품 카드 ── */
    .artwork-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      transition: border-color 0.3s;
    }
    .artwork-card.loaded { border-color: rgba(52,211,153,0.3); }

    /* 이미지 영역 */
    .artwork-image-wrap {
      position: relative;
      background: #0c1017;
      min-height: 380px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .artwork-image-wrap img {
      width: 100%; max-height: 520px;
      object-fit: contain;
      display: block;
      transition: opacity 0.6s ease;
    }
    .artwork-image-wrap img.hidden { opacity: 0; }

    /* 이미지 로딩 스켈레톤 */
    .img-skeleton {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, #1e2533 25%, #252e40 50%, #1e2533 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .img-skeleton.hidden { display: none; }

    /* 작품 정보 */
    .artwork-info {
      padding: 32px 36px 36px;
    }
    .artwork-origin {
      font-size: 11px; font-weight: 700; color: var(--green);
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;
    }
    .artwork-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 700; color: #ffffff;
      line-height: 1.3; margin-bottom: 8px;
    }
    .artwork-artist {
      font-size: 15px; color: var(--text-muted);
      margin-bottom: 4px;
    }
    .artwork-date {
      font-size: 13px; color: var(--text-dim);
      margin-bottom: 28px;
    }

    /* 구분선 */
    .divider {
      height: 1px; background: var(--border); margin-bottom: 28px;
    }

    /* 해설 텍스트 */
    .desc-label {
      font-size: 11px; font-weight: 700; color: var(--green);
      letter-spacing: 1px; margin-bottom: 12px;
    }
    .artwork-desc {
      font-size: 15px; color: var(--text-muted);
      line-height: 1.85; word-break: keep-all;
      margin-bottom: 32px;
      min-height: 80px;
    }
    .artwork-desc.loading {
      background: linear-gradient(90deg, #1e2533 25%, #252e40 50%, #1e2533 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px; color: transparent;
    }

    /* ── TTS 컨트롤 ── */
    .tts-bar {
      display: flex; align-items: center; gap: 12px;
      background: rgba(52,211,153,0.06);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 14px; padding: 16px 20px;
      margin-bottom: 28px;
    }
    .tts-play-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--green); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      transition: all 0.2s; box-shadow: 0 4px 14px var(--green-glow);
    }
    .tts-play-btn:hover { transform: scale(1.08); background: #2ecc8a; }
    .tts-play-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .tts-info { flex: 1; }
    .tts-title { font-size: 13px; font-weight: 600; color: var(--text-dark); margin-bottom: 3px; }
    .tts-status { font-size: 12px; color: var(--text-dim); }
    .tts-speed {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 12px; font-weight: 600;
      padding: 6px 10px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .tts-speed:hover { background: rgba(255,255,255,0.1); color: var(--text-dark); }

    /* 재생 진행바 */
    .tts-progress {
      height: 3px; background: var(--border); border-radius: 2px;
      margin-top: 10px; overflow: hidden;
    }
    .tts-progress-bar {
      height: 100%; background: var(--green); border-radius: 2px;
      width: 0%; transition: width 0.3s linear;
    }

    /* ── 메타 정보 태그 ── */
    .meta-tags {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 0;
    }
    .meta-tag {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px;
      font-size: 12px; color: var(--text-dim);
    }
    .meta-tag strong { color: var(--text-muted); font-weight: 600; }

    /* ── 하단 내비게이션 ── */
    .nav-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 28px; padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .nav-arrow {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 13px; font-weight: 500;
      padding: 10px 18px; border-radius: 10px; cursor: pointer;
      transition: all 0.2s;
    }
    .nav-arrow:hover { background: rgba(255,255,255,0.08); color: var(--text-dark); border-color: rgba(255,255,255,0.2); }
    .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-counter {
      font-size: 13px; color: var(--text-dim); font-weight: 500;
    }

    /* ── 새로고침 버튼 ── */
    .refresh-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--green-dim); border: 1px solid rgba(52,211,153,0.3);
      color: var(--green); font-size: 13px; font-weight: 600;
      padding: 10px 18px; border-radius: 10px; cursor: pointer;
      transition: all 0.2s; margin-top: 20px; width: 100%; justify-content: center;
    }
    .refresh-btn:hover { background: rgba(52,211,153,0.2); }
    .refresh-btn.spinning .icon { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 에러 상태 ── */
    .error-box {
      text-align: center; padding: 60px 24px;
      display: none;
    }
    .error-box.show { display: block; }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-title { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }
    .error-msg { font-size: 14px; color: var(--text-muted); }

    /* ── 푸터 ── */
    .footer {
      text-align: center; padding: 40px 24px;
      font-size: 12px; color: var(--text-dim);
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    .footer a { color: var(--text-dim); text-decoration: none; }
    .footer a:hover { color: var(--text-muted); }

    /* ── 반응형 ── */
    @media (max-width: 600px) {
      .artwork-info { padding: 24px 20px 28px; }
      .tts-bar { padding: 14px 16px; }
      .artwork-image-wrap { min-height: 240px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="back-btn">← <span id="backLabel">홈으로</span></a>
      <span class="header-logo">🖼️ ART OF THE DAY</span>
      <button class="lang-btn" id="langToggle">🌐 EN</button>
    </div>
  </header>

  <main class="main">

    <div class="date-badge" id="dateBadge">오늘의 작품을 불러오는 중...</div>

    <!-- 메인 작품 카드 -->
    <div class="artwork-card" id="artCard">

      <!-- 이미지 -->
      <div class="artwork-image-wrap">
        <div class="img-skeleton" id="imgSkeleton"></div>
        <img id="artImage" class="hidden" src="" alt="" />
      </div>

      <!-- 에러 -->
      <div class="error-box" id="errorBox">
        <div class="error-icon">🖼️</div>
        <div class="error-title" id="errorTitle">작품을 불러오지 못했습니다</div>
        <div class="error-msg" id="errorMsg">잠시 후 다시 시도해 주세요.</div>
      </div>

      <!-- 정보 -->
      <div class="artwork-info" id="artInfo" style="display:none;">

        <div class="artwork-origin" id="artOrigin"></div>
        <div class="artwork-title" id="artTitle">—</div>
        <div class="artwork-artist" id="artArtist"></div>
        <div class="artwork-date" id="artDate"></div>

        <div class="divider"></div>

        <!-- TTS 플레이어 -->
        <div class="tts-bar">
          <button class="tts-play-btn" id="ttsBtn" title="음성 해설 재생">▶</button>
          <div class="tts-info">
            <div class="tts-title" id="ttsTitle">음성 해설</div>
            <div class="tts-status" id="ttsStatus">재생 버튼을 눌러 해설을 들어보세요</div>
            <div class="tts-progress">
              <div class="tts-progress-bar" id="ttsBar"></div>
            </div>
          </div>
          <button class="tts-speed" id="ttsSpeedBtn">1.0×</button>
        </div>

        <!-- 해설 텍스트 -->
        <div class="desc-label" id="descLabel">작품 해설</div>
        <div class="artwork-desc" id="artDesc"></div>

        <!-- 메타 태그 -->
        <div class="meta-tags" id="metaTags"></div>

        <!-- 내비게이션 -->
        <div class="nav-bar">
          <button class="nav-arrow" id="prevBtn">← <span id="prevLabel">이전 작품</span></button>
          <span class="nav-counter" id="navCounter"></span>
          <button class="nav-arrow" id="nextBtn"><span id="nextLabel">다음 작품</span> →</button>
        </div>

      </div>
    </div>

    <button class="refresh-btn" id="refreshBtn">
      <span class="icon">🔄</span> <span id="refreshLabel">다른 작품 보기</span>
    </button>

  </main>

  <footer class="footer">
    <p>작품 데이터 제공: <a href="https://www.artic.edu/" target="_blank">Art Institute of Chicago</a> (공개 API)</p>
    <p style="margin-top:6px;">© 2026 Daily-Dapp</p>
  </footer>

  <script>
    // ── 상태 ──
    let currentLang = 'ko';
    let artworks = [];
    let currentIndex = 0;
    let ttsUtterance = null;
    let ttsPlaying = false;
    let ttsSpeed = 1.0;
    let ttsProgressTimer = null;
    let ttsStartTime = 0;
    let ttsDuration = 0;

    // ── i18n ──
    const i18n = {
      ko: {
        langBtn: '🌐 EN', back: '홈으로',
        loading: '오늘의 작품을 불러오는 중...',
        badgePrefix: '오늘의 작품',
        descLabel: '작품 해설',
        ttsTitle: '음성 해설',
        ttsReady: '재생 버튼을 눌러 해설을 들어보세요',
        ttsPlaying: '재생 중...',
        ttsPaused: '일시정지됨',
        ttsDone: '재생 완료',
        ttsNoSupport: '이 브라우저는 음성을 지원하지 않습니다',
        prev: '이전 작품', next: '다음 작품',
        refresh: '다른 작품 보기',
        errTitle: '작품을 불러오지 못했습니다',
        errMsg: '네트워크 연결을 확인하고 다시 시도해 주세요.',
        metaMedium: '재료/기법', metaOrigin: '소장처',
        counter: (cur, total) => `${cur} / ${total}`,
        noDesc: '이 작품에 대한 해설 정보가 없습니다.',
      },
      en: {
        langBtn: '🌐 KO', back: 'Home',
        loading: 'Loading today\'s artwork...',
        badgePrefix: 'Art of the Day',
        descLabel: 'About This Work',
        ttsTitle: 'Audio Guide',
        ttsReady: 'Press play to listen to the audio guide',
        ttsPlaying: 'Playing...',
        ttsPaused: 'Paused',
        ttsDone: 'Playback complete',
        ttsNoSupport: 'Your browser doesn\'t support speech synthesis',
        prev: 'Previous', next: 'Next',
        refresh: 'Discover Another',
        errTitle: 'Could not load artwork',
        errMsg: 'Please check your connection and try again.',
        metaMedium: 'Medium', metaOrigin: 'Collection',
        counter: (cur, total) => `${cur} of ${total}`,
        noDesc: 'No description available for this artwork.',
      }
    };

    // ── 날짜 포맷 ──
    function getTodayString(lang) {
      const now = new Date();
      if (lang === 'ko') {
        return `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;
      }
      return now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // ── HTML 태그 제거 ──
    function stripHtml(html) {
      if (!html) return '';
      return html.replace(/<[^>]+>/g, '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').trim();
    }

    // ── AIC API: 오늘 날짜 시드로 작품 목록 가져오기 ──
    async function fetchArtworks() {
      const today = new Date();
      const seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
      const page = (seed % 50) + 1;

      const url = `https://api.artic.edu/api/v1/artworks?page=${page}&limit=10&fields=id,title,artist_display,date_display,image_id,medium_display,place_of_origin,description,short_description,dimensions&query[term][is_public_domain]=true`;

      const res = await fetch(url);
      if (!res.ok) throw new Error('API error');
      const data = await res.json();

      // 이미지 있는 것만 필터
      return data.data.filter(a => a.image_id);
    }

    // ── 이미지 URL 생성 ──
    function imageUrl(imageId) {
      return `https://www.artic.edu/iiif/2/${imageId}/full/843,/0/default.jpg`;
    }

    // ── 해설 텍스트 생성 ──
    function buildDescription(artwork, lang) {
      const t = i18n[lang];
      let desc = stripHtml(artwork.description || artwork.short_description || '');

      if (!desc) {
        // 기본 해설 자동 생성
        const artist = artwork.artist_display ? artwork.artist_display.split('\n')[0] : '';
        const date = artwork.date_display || '';
        const medium = artwork.medium_display || '';
        const origin = artwork.place_of_origin || '';

        if (lang === 'ko') {
          desc = `${artist ? `${artist}의 작품` : '작가 미상의 작품'}으로`;
          if (date) desc += ` ${date}년경에 제작되었습니다.`;
          if (medium) desc += ` ${medium}을(를) 사용한 이 작품은`;
          if (origin) desc += ` ${origin} 출신 작가의 예술 세계를 담고 있습니다.`;
          desc += ' 시카고 미술관(Art Institute of Chicago)이 소장하고 있는 공공 도메인 작품입니다.';
        } else {
          desc = `This work`;
          if (artist) desc += ` by ${artist.split('\n')[0]}`;
          if (date) desc += ` dates to around ${date}.`;
          if (medium) desc += ` Created using ${medium},`;
          if (origin) desc += ` it reflects the artistic tradition of ${origin}.`;
          desc += ' This work is in the public domain and held in the collection of the Art Institute of Chicago.';
        }
      }

      return desc;
    }

    // ── 작품 렌더링 ──
    function renderArtwork(artwork) {
      const t = i18n[currentLang];
      const artInfo = document.getElementById('artInfo');
      const errorBox = document.getElementById('errorBox');
      const imgSkeleton = document.getElementById('imgSkeleton');
      const artImage = document.getElementById('artImage');
      const artCard = document.getElementById('artCard');

      // 정보 숨기고 에러박스 닫기
      artInfo.style.display = 'none';
      errorBox.classList.remove('show');
      imgSkeleton.classList.remove('hidden');
      artImage.classList.add('hidden');
      artCard.classList.remove('loaded');

      // TTS 중지
      stopTTS();

      // 텍스트 채우기
      document.getElementById('artOrigin').textContent = artwork.place_of_origin || 'Art Institute of Chicago';
      document.getElementById('artTitle').textContent = artwork.title || '—';

      const artistName = artwork.artist_display ? artwork.artist_display.split('\n')[0] : (currentLang === 'ko' ? '작가 미상' : 'Unknown Artist');
      document.getElementById('artArtist').textContent = artistName;
      document.getElementById('artDate').textContent = artwork.date_display || '';

      // 해설
      const desc = buildDescription(artwork, currentLang);
      const artDesc = document.getElementById('artDesc');
      artDesc.textContent = desc || t.noDesc;

      // 메타 태그
      const metaTags = document.getElementById('metaTags');
      metaTags.innerHTML = '';
      if (artwork.medium_display) {
        metaTags.innerHTML += `<span class="meta-tag"><strong>${t.metaMedium}:</strong> ${artwork.medium_display.split(';')[0]}</span>`;
      }
      metaTags.innerHTML += `<span class="meta-tag"><strong>${t.metaOrigin}:</strong> Art Institute of Chicago</span>`;

      // 카운터
      document.getElementById('navCounter').textContent = t.counter(currentIndex + 1, artworks.length);

      // 이전/다음 버튼
      document.getElementById('prevBtn').disabled = currentIndex === 0;
      document.getElementById('nextBtn').disabled = currentIndex === artworks.length - 1;

      // TTS 상태 초기화
      document.getElementById('ttsStatus').textContent = t.ttsReady;
      document.getElementById('ttsBtn').textContent = '▶';
      document.getElementById('ttsBar').style.width = '0%';

      // 이미지 로드
      const img = document.getElementById('artImage');
      const newImg = new Image();
      newImg.onload = () => {
        img.src = newImg.src;
        img.alt = artwork.title || '';
        imgSkeleton.classList.add('hidden');
        img.classList.remove('hidden');
        artInfo.style.display = 'block';
        artCard.classList.add('loaded');
      };
      newImg.onerror = () => {
        imgSkeleton.classList.add('hidden');
        artInfo.style.display = 'block';
        artCard.classList.add('loaded');
      };
      newImg.src = imageUrl(artwork.image_id);
    }

    // ── TTS ──
    function stopTTS() {
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      ttsPlaying = false;
      clearInterval(ttsProgressTimer);
      document.getElementById('ttsBtn').textContent = '▶';
      document.getElementById('ttsBar').style.width = '0%';
    }

    function startTTS() {
      if (!window.speechSynthesis) {
        document.getElementById('ttsStatus').textContent = i18n[currentLang].ttsNoSupport;
        return;
      }

      const artwork = artworks[currentIndex];
      const desc = buildDescription(artwork, currentLang);
      const titleText = artwork.title || '';
      const artistText = artwork.artist_display ? artwork.artist_display.split('\n')[0] : '';

      let fullText = '';
      if (currentLang === 'ko') {
        fullText = `${titleText}. ${artistText}. ${desc}`;
      } else {
        fullText = `${titleText}, by ${artistText}. ${desc}`;
      }

      window.speechSynthesis.cancel();
      ttsUtterance = new SpeechSynthesisUtterance(fullText);
      ttsUtterance.lang = currentLang === 'ko' ? 'ko-KR' : 'en-US';
      ttsUtterance.rate = ttsSpeed;

      const t = i18n[currentLang];
      ttsUtterance.onstart = () => {
        ttsPlaying = true;
        document.getElementById('ttsBtn').textContent = '⏸';
        document.getElementById('ttsStatus').textContent = t.ttsPlaying;
        // 진행바 시뮬레이션
        ttsStartTime = Date.now();
        ttsDuration = (fullText.length / 5) * (1000 / ttsSpeed);
        clearInterval(ttsProgressTimer);
        ttsProgressTimer = setInterval(() => {
          const elapsed = Date.now() - ttsStartTime;
          const pct = Math.min((elapsed / ttsDuration) * 100, 99);
          document.getElementById('ttsBar').style.width = pct + '%';
        }, 200);
      };
      ttsUtterance.onend = () => {
        ttsPlaying = false;
        clearInterval(ttsProgressTimer);
        document.getElementById('ttsBtn').textContent = '▶';
        document.getElementById('ttsStatus').textContent = t.ttsDone;
        document.getElementById('ttsBar').style.width = '100%';
        setTimeout(() => document.getElementById('ttsBar').style.width = '0%', 1500);
      };
      ttsUtterance.onerror = () => {
        ttsPlaying = false;
        clearInterval(ttsProgressTimer);
        document.getElementById('ttsBtn').textContent = '▶';
      };

      window.speechSynthesis.speak(ttsUtterance);
    }

    // ── UI 텍스트 갱신 ──
    function applyLang() {
      const t = i18n[currentLang];
      document.getElementById('langToggle').textContent = t.langBtn;
      document.getElementById('backLabel').textContent = t.back;
      document.getElementById('dateBadge').textContent = `🎨 ${t.badgePrefix} · ${getTodayString(currentLang)}`;
      document.getElementById('descLabel').textContent = t.descLabel;
      document.getElementById('ttsTitle').textContent = t.ttsTitle;
      document.getElementById('refreshLabel').textContent = t.refresh;
      document.getElementById('prevLabel').textContent = t.prev;
      document.getElementById('nextLabel').textContent = t.next;
      if (!ttsPlaying) document.getElementById('ttsStatus').textContent = t.ttsReady;

      // html lang
      document.documentElement.lang = currentLang;

      // 현재 작품 재렌더링 (해설 언어 변경)
      if (artworks.length > 0) renderArtwork(artworks[currentIndex]);

      try { localStorage.setItem('daily_lang', currentLang); } catch(e) {}
    }

    // ── 초기 로드 ──
    async function init() {
      // 언어 초기화
      const params = new URLSearchParams(location.search);
      const saved = (() => { try { return localStorage.getItem('daily_lang'); } catch(e) { return null; } })();
      currentLang = params.get('lang') || saved || 'ko';

      applyLang();

      const t = i18n[currentLang];
      document.getElementById('dateBadge').textContent = `🎨 ${t.loading}`;

      try {
        artworks = await fetchArtworks();
        if (!artworks.length) throw new Error('No artworks');
        currentIndex = 0;
        renderArtwork(artworks[currentIndex]);
        document.getElementById('dateBadge').textContent = `🎨 ${t.badgePrefix} · ${getTodayString(currentLang)}`;
      } catch(err) {
        document.getElementById('imgSkeleton').classList.add('hidden');
        document.getElementById('errorBox').classList.add('show');
        document.getElementById('errorTitle').textContent = t.errTitle;
        document.getElementById('errorMsg').textContent = t.errMsg;
        document.getElementById('dateBadge').textContent = `🎨 ${t.badgePrefix}`;
      }
    }

    // ── 이벤트 바인딩 ──
    function bindEvents() {
      // 언어 전환
      document.getElementById('langToggle').onclick = () => {
        stopTTS();
        currentLang = currentLang === 'ko' ? 'en' : 'ko';
        applyLang();
      };

      // TTS 재생/일시정지
      document.getElementById('ttsBtn').onclick = () => {
        if (!window.speechSynthesis) return;
        if (ttsPlaying) {
          window.speechSynthesis.pause();
          ttsPlaying = false;
          clearInterval(ttsProgressTimer);
          document.getElementById('ttsBtn').textContent = '▶';
          document.getElementById('ttsStatus').textContent = i18n[currentLang].ttsPaused;
        } else if (window.speechSynthesis.paused) {
          window.speechSynthesis.resume();
          ttsPlaying = true;
          document.getElementById('ttsBtn').textContent = '⏸';
          document.getElementById('ttsStatus').textContent = i18n[currentLang].ttsPlaying;
          // 진행바 재개
          ttsProgressTimer = setInterval(() => {
            const elapsed = Date.now() - ttsStartTime;
            const pct = Math.min((elapsed / ttsDuration) * 100, 99);
            document.getElementById('ttsBar').style.width = pct + '%';
          }, 200);
        } else {
          startTTS();
        }
      };

      // TTS 속도
      const speeds = [1.0, 1.25, 1.5, 0.75];
      let speedIdx = 0;
      document.getElementById('ttsSpeedBtn').onclick = () => {
        speedIdx = (speedIdx + 1) % speeds.length;
        ttsSpeed = speeds[speedIdx];
        document.getElementById('ttsSpeedBtn').textContent = ttsSpeed + '×';
        if (ttsPlaying) {
          stopTTS();
          startTTS();
        }
      };

      // 이전/다음
      document.getElementById('prevBtn').onclick = () => {
        if (currentIndex > 0) { currentIndex--; renderArtwork(artworks[currentIndex]); }
      };
      document.getElementById('nextBtn').onclick = () => {
        if (currentIndex < artworks.length - 1) { currentIndex++; renderArtwork(artworks[currentIndex]); }
      };

      // 다른 작품 보기 (새 페이지 랜덤)
      document.getElementById('refreshBtn').onclick = async () => {
        stopTTS();
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('spinning');
        btn.disabled = true;

        try {
          const page = Math.floor(Math.random() * 100) + 1;
          const url = `https://api.artic.edu/api/v1/artworks?page=${page}&limit=10&fields=id,title,artist_display,date_display,image_id,medium_display,place_of_origin,description,short_description&query[term][is_public_domain]=true`;
          const res = await fetch(url);
          const data = await res.json();
          const filtered = data.data.filter(a => a.image_id);
          if (filtered.length) {
            artworks = filtered;
            currentIndex = 0;
            renderArtwork(artworks[currentIndex]);
          }
        } catch(e) {}

        btn.classList.remove('spinning');
        btn.disabled = false;
      };
    }

    // ── 시작 ──
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => { bindEvents(); init(); });
    } else {
      bindEvents(); init();
    }
  </script>
</body>
</html>
