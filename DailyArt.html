<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 미술 작품 · Daily-Dapp</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main: #141923;
      --bg-sub: #1e2533;
      --bg-card: rgba(255,255,255,0.05);
      --text-dark: #f8fafc;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --border: rgba(255,255,255,0.09);
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.15);
      --green-glow: rgba(52,211,153,0.25);
      --brand-blue: #3182f6;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-main);
      color: var(--text-dark);
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 헤더 ── */
    .header {
      position: fixed; top: 0; inset-inline: 0; height: 60px;
      background: rgba(20,25,35,0.75);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex; align-items: center;
    }
    .header-inner {
      max-width: 900px; margin: 0 auto; width: 100%;
      padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text-dark); }
    .header-logo {
      font-size: 15px; font-weight: 700; color: var(--green);
      letter-spacing: 0.5px;
    }
    .lang-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 13px; font-weight: 600;
      padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-dark); }

    /* ── 메인 레이아웃 - 전체 뷰포트 ── */
    .main {
      height: calc(100vh - 60px);
      height: calc(100dvh - 60px); /* 모바일 주소창 대응 */
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 이미지 영역 - 남은 공간 전부 ── */
    .artwork-image-wrap {
      position: relative;
      flex: 1;
      background: #0a0e15;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      min-height: 0;
    }
    .artwork-image-wrap img {
      max-width: 100%; max-height: 100%;
      width: auto; height: auto;
      object-fit: contain;
      display: block;
      transition: opacity 0.3s ease;
    }
    .artwork-image-wrap img.hidden { opacity: 0; }

    /* 스켈레톤 */
    .img-skeleton {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, #1e2533 25%, #252e40 50%, #1e2533 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .img-skeleton.hidden { display: none; }

    /* ── 전체화면 모달 ── */
    .fullscreen-modal {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      background: #000;
    }
    .fullscreen-modal.show { display: block; }

    /* 이미지: 항상 전체화면 꽉 채움 */
    .fullscreen-modal img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      user-select: none;
    }

    /* 작품 정보: 이미지 위에 오버레이 (하단) */
    .fs-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.88));
      padding: 40px 24px 24px;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 10;
    }
    .fs-info.hidden {
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
    }
    .fs-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(15px, 2.5vw, 24px);
      font-weight: 700; color: #fff;
      margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fs-meta {
      font-size: clamp(12px, 1.8vw, 15px);
      color: rgba(255,255,255,0.75);
      margin-bottom: 8px;
    }
    .fs-desc {
      font-size: clamp(11px, 1.5vw, 13px);
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: keep-all;
    }

    /* 이미지에 확대 커서 */
    .artwork-image-wrap img { cursor: zoom-in; }
    .info-bar {
      flex-shrink: 0;
      background: rgba(20,25,35,0.95);
      border-top: 1px solid var(--border);
      padding: 14px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .info-bar.hidden { display: none; }

    /* 제목 행: 제목 | TTS버튼 | ‹ 카운터 › */
    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .artwork-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(15px, 2vw, 20px);
      font-weight: 700; color: #ffffff;
      line-height: 1.2;
      flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* TTS 버튼 (아이콘만) */
    .tts-icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--green); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
      transition: all 0.2s; box-shadow: 0 2px 10px var(--green-glow);
    }
    .tts-icon-btn:hover { transform: scale(1.1); background: #2ecc8a; }
    .tts-icon-btn.playing { background: #f59e0b; box-shadow: 0 2px 10px rgba(245,158,11,0.3); }

    /* 좌우 네비 */
    .nav-group {
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .nav-icon-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; line-height: 1;
    }
    .nav-icon-btn:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.2); }
    .nav-icon-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .nav-counter {
      font-size: 12px; color: var(--text-dim); font-weight: 600;
      min-width: 36px; text-align: center;
    }

    /* 메타 행: 작가 · 날짜 · 재료 */
    .meta-row {
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
    }
    .artwork-artist {
      font-size: 13px; color: var(--text-muted); font-weight: 500;
    }
    .meta-dot { color: var(--text-dim); font-size: 11px; }
    .artwork-date-inline {
      font-size: 12px; color: var(--text-dim);
    }
    .artwork-medium-inline {
      font-size: 12px; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 200px;
    }

    /* TTS 진행바 */
    .tts-progress {
      height: 2px; background: var(--border); border-radius: 1px; overflow: hidden;
    }
    .tts-progress-bar {
      height: 100%; background: var(--green); border-radius: 1px;
      width: 0%; transition: width 0.3s linear;
    }

    /* ── 에러 상태 ── */
    .error-box {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px;
    }
    .error-box.show { display: flex; }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-title { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }
    .error-msg { font-size: 14px; color: var(--text-muted); }

    /* ── 날짜 배지 (이미지 위 절대 위치) ── */
    .date-badge {
      position: absolute; top: 12px; left: 12px; z-index: 5;
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(20,25,35,0.75); border: 1px solid rgba(52,211,153,0.3);
      color: var(--green); font-size: 11px; font-weight: 700;
      padding: 5px 12px; border-radius: 20px; letter-spacing: 0.4px;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 600px) {
      .artwork-medium-inline { display: none; }
      .info-bar { padding: 12px 14px 10px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="back-btn">← <span id="backLabel">홈으로</span></a>
      <span class="header-logo">🖼️ ART OF THE DAY</span>
      <button class="lang-btn" id="langToggle">🌐 EN</button>
    </div>
  </header>

  <main class="main">

    <!-- 이미지 영역 (flex:1, 남은 공간 전부) -->
    <div class="artwork-image-wrap">
      <div class="img-skeleton" id="imgSkeleton"></div>
      <img id="artImage" class="hidden" src="" alt="" />
      <div class="date-badge" id="dateBadge">🎨 불러오는 중...</div>
      <!-- 에러 -->
      <div class="error-box" id="errorBox">
        <div class="error-icon">🖼️</div>
        <div class="error-title" id="errorTitle">작품을 불러오지 못했습니다</div>
        <div class="error-msg" id="errorMsg">잠시 후 다시 시도해 주세요.</div>
      </div>
    </div>

    <!-- 하단 정보 바 -->
    <div class="info-bar hidden" id="infoBar">

      <!-- TTS 진행바 -->
      <div class="tts-progress"><div class="tts-progress-bar" id="ttsBar"></div></div>

      <!-- 제목 행: [제목] [🔊] [이전 다음] -->
      <div class="info-row">
        <div class="artwork-title" id="artTitle">—</div>
        <button class="tts-icon-btn" id="ttsBtn" title="음성 해설">▶</button>
        <div class="nav-group">
          <button class="nav-icon-btn" id="prevBtn" title="이전">‹</button>
          <button class="nav-icon-btn" id="nextBtn" title="다음">›</button>
        </div>
      </div>

      <!-- 메타 행: 작가 · 날짜 · 재료 -->
      <div class="meta-row">
        <span class="artwork-artist" id="artArtist"></span>
        <span class="meta-dot">·</span>
        <span class="artwork-date-inline" id="artDate"></span>
        <span class="meta-dot">·</span>
        <span class="artwork-medium-inline" id="artMedium"></span>
      </div>

    </div>

  </main>

  <!-- 전체화면 모달 -->
  <div class="fullscreen-modal" id="fullscreenModal">
    <img id="fullscreenImg" src="" alt="" />
    <div class="fs-info" id="fsInfo">
      <div class="fs-title" id="fsTitle"></div>
      <div class="fs-meta" id="fsMeta"></div>
      <div class="fs-desc" id="fsDesc"></div>
    </div>
  </div>

  <script>
    // ── 상태 ──
    let currentLang = 'ko';
    let artworks = [];
    let currentIndex = 0;
    let currentArtwork = null;
    let ttsUtterance = null;
    let ttsPlaying = false;
    let ttsSpeed = 1.0;
    let ttsProgressTimer = null;
    let ttsStartTime = 0;
    let ttsDuration = 0;

    // ── i18n ──
    const i18n = {
      ko: {
        langBtn: '🌐 EN', back: '홈으로',
        loading: '오늘의 작품을 불러오는 중...',
        badgePrefix: '오늘의 작품',
        descLabel: '작품 해설',
        ttsTitle: '음성 해설',
        ttsReady: '재생 버튼을 눌러 해설을 들어보세요',
        ttsPlaying: '재생 중...',
        ttsPaused: '일시정지됨',

        errMsg: '네트워크 연결을 확인하고 다시 시도해 주세요.',
        metaMedium: '재료/기법', metaOrigin: '소장처',
        counter: (cur, total) => `${cur} / ${total}`,
        noDesc: '이 작품에 대한 해설 정보가 없습니다.',
      },
      en: {
        langBtn: '🌐 KO', back: 'Home',
        loading: 'Loading today\'s artwork...',
        badgePrefix: 'Art of the Day',
        descLabel: 'About This Work',
        ttsTitle: 'Audio Guide',
        ttsReady: 'Press play to listen to the audio guide',
        ttsPlaying: 'Playing...',
        ttsPaused: 'Paused',
        ttsDone: 'Playback complete',
        ttsNoSupport: 'Your browser doesn\'t support speech synthesis',
        prev: 'Previous', next: 'Next',
        refresh: 'Discover Another',
        errTitle: 'Could not load artwork',
        errMsg: 'Please check your connection and try again.',
        metaMedium: 'Medium', metaOrigin: 'Collection',
        counter: (cur, total) => `${cur} of ${total}`,
        noDesc: 'No description available for this artwork.',
      }
    };

    // ── 날짜 포맷 ──
    function getTodayString(lang) {
      const now = new Date();
      if (lang === 'ko') {
        return `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;
      }
      return now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // ── HTML 태그 제거 ──
    function stripHtml(html) {
      if (!html) return '';
      return html.replace(/<[^>]+>/g, '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').trim();
    }

    // ── 로컬 이미지 기반 작품 데이터 (24개) ──
    const ARTWORKS_DB = [
      { id:1, title:"Starry Night", title_ko:"별이 빛나는 밤", artist_display:"Vincent van Gogh\nDutch, 1853–1890", date_display:"1889", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"l", ratio:"l", image_file:"01_starry_night.jpg", collection:"Museum of Modern Art, New York", description_en:"The Starry Night depicts the view from the east-facing window of his asylum room at Saint-Paul-de-Mausole, just before sunrise. The swirling sky and luminous stars contrast with the quiet village below.", description_ko:"「별이 빛나는 밤」은 반 고흐가 생 폴 드 무졸 요양원에서 치료를 받던 중 창문 너머로 바라본 새벽 풍경을 담은 작품입니다. 소용돌이치는 밤하늘과 빛나는 별들, 그리고 고요한 마을이 극적으로 대비를 이루며, 고흐 특유의 강렬한 붓 터치와 색채가 감상자에게 깊은 감동을 전합니다." },
      { id:2, title:"Girl with a Pearl Earring", title_ko:"진주 귀걸이를 한 소녀", artist_display:"Johannes Vermeer\nDutch, 1632–1675", date_display:"c. 1665", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"p", ratio:"p", image_file:"02_pearl_earring.jpg", collection:"Mauritshuis, The Hague", description_en:"Often referred to as the Mona Lisa of the North, this tronie by Vermeer features a girl\'s direct gaze and luminous pearl earring creating an intimate sense of connection with the viewer.", description_ko:"「진주 귀걸이를 한 소녀」는 \'북쪽의 모나리자\'로 불리는 베르메르의 대표작입니다. 어두운 배경에서 고개를 돌린 소녀의 눈빛과 귀에 달린 진주 귀걸이의 광택이 신비로운 분위기를 자아냅니다." },
      { id:3, title:"The Gleaners", title_ko:"이삭 줍는 사람들", artist_display:"Jean-François Millet\nFrench, 1814–1875", date_display:"1857", medium_display:"Oil on canvas", place_of_origin:"France", ratio:"l", ratio:"l", image_file:"03_birth_of_venus.jpg", collection:"Musée d\'Orsay, Paris", description_en:"The Gleaners depicts three peasant women gleaning a field after the harvest. Millet\'s dignified portrayal of rural labor was controversial at the time but is now celebrated as a masterpiece of Realism.", description_ko:"「이삭 줍는 사람들」은 추수가 끝난 들판에서 떨어진 이삭을 줍는 세 명의 농촌 여성을 묘사한 밀레의 걸작입니다. 당시에는 논란을 일으켰지만, 지금은 사실주의 미술의 대표작으로 높이 평가받습니다." },
      { id:4, title:"The Great Wave off Kanagawa", title_ko:"가나가와 해변의 높은 파도", artist_display:"Katsushika Hokusai\nJapanese, 1760–1849", date_display:"c. 1831", medium_display:"Woodblock print", place_of_origin:"Japan", ratio:"l", ratio:"l", image_file:"04_great_wave.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"The Great Wave is the most recognized work of Japanese art in the world. It depicts an enormous wave threatening boats off the coast of Kanagawa, with Mount Fuji visible in the background.", description_ko:"「가나가와 해변의 높은 파도」는 세계에서 가장 유명한 일본 미술 작품입니다. 거대한 파도가 배들을 위협하는 장면 뒤로 후지산이 보이며, 우키요에 판화의 정수를 보여줍니다." },
      { id:5, title:"Mona Lisa", title_ko:"모나 리자", artist_display:"Leonardo da Vinci\nItalian, 1452–1519", date_display:"c. 1503–1519", medium_display:"Oil on poplar panel", place_of_origin:"Italy", ratio:"p", ratio:"p", image_file:"05_mona_lisa.jpg", collection:"Louvre Museum, Paris", description_en:"The Mona Lisa is perhaps the most famous painting in the world. Leonardo\'s mastery of sfumato technique creates the enigmatic smile that has captivated viewers for centuries.", description_ko:"「모나 리자」는 세계에서 가장 유명한 회화입니다. 레오나르도 다 빈치 특유의 스푸마토 기법으로 묘사된 신비로운 미소는 수백 년간 전 세계인을 매료시켜 왔습니다." },
      { id:6, title:"The Persistence of Memory", title_ko:"기억의 지속", artist_display:"Salvador Dalí\nSpanish, 1904–1989", date_display:"1931", medium_display:"Oil on canvas", place_of_origin:"Spain", ratio:"l", ratio:"l", image_file:"06_persistence_memory.jpg", collection:"Museum of Modern Art, New York", description_en:"One of the most recognizable works of Surrealism, featuring melting pocket watches in a dreamlike landscape, meditating on the fluidity of time.", description_ko:"「기억의 지속」은 초현실주의를 대표하는 달리의 걸작입니다. 녹아 흘러내리는 시계들이 놓인 황량한 풍경은 시간의 유동성과 꿈의 세계를 표현합니다." },
      { id:7, title:"Las Meninas", title_ko:"시녀들", artist_display:"Diego Velázquez\nSpanish, 1599–1660", date_display:"1656", medium_display:"Oil on canvas", place_of_origin:"Spain", ratio:"p", ratio:"p", image_file:"07_las_meninas.jpg", collection:"Museo del Prado, Madrid", description_en:"Las Meninas is widely regarded as one of the most important paintings in Western art history. Its complex composition challenges the relationship between viewer and subject.", description_ko:"「시녀들」은 서양 미술사에서 가장 중요한 작품 중 하나입니다. 그림 속 거울에 왕과 왕비가 비쳐 보이는 복잡한 구도로 관람자와 작품의 경계를 허무는 혁신적인 구성을 보여줍니다." },
      { id:8, title:"Liberty Leading the People", title_ko:"민중을 이끄는 자유의 여신", artist_display:"Eugène Delacroix\nFrench, 1798–1863", date_display:"1830", medium_display:"Oil on canvas", place_of_origin:"France", ratio:"l", ratio:"l", image_file:"09_school_of_athens.jpg", collection:"Louvre Museum, Paris", description_en:"Liberty Leading the People commemorates the July Revolution of 1830. A bare-breasted woman personifying Liberty leads the people forward over barricades, holding the French tricolour aloft.", description_ko:"「민중을 이끄는 자유의 여신」은 1830년 7월 혁명을 기념하는 들라크루아의 걸작입니다. 자유를 상징하는 여신이 프랑스 삼색기를 높이 들고 바리케이드를 넘어 민중을 이끄는 역동적인 장면을 담았습니다." },
      { id:9, title:"The Night Watch", title_ko:"야경", artist_display:"Rembrandt van Rijn\nDutch, 1606–1669", date_display:"1642", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"l", ratio:"l", image_file:"10_night_watch.jpg", collection:"Rijksmuseum, Amsterdam", description_en:"The Night Watch is one of the most famous Dutch Golden Age paintings. Rembrandt\'s masterful use of light and shadow creates a dramatic scene of city guards.", description_ko:"「야경」은 네덜란드 황금시대를 대표하는 렘브란트의 걸작입니다. 빛과 그림자의 극적인 대비와 생동감 넘치는 인물 묘사로 당시 집단 초상화의 관습을 뛰어넘는 혁신적 구성을 보여줍니다." },
      { id:10, title:"Guernica", title_ko:"게르니카", artist_display:"Pablo Picasso\nSpanish, 1881–1973", date_display:"1937", medium_display:"Oil on canvas", place_of_origin:"Spain", ratio:"l", ratio:"l", image_file:"11_guernica.jpg", collection:"Museo Reina Sofía, Madrid", description_en:"Guernica is a powerful anti-war statement created in response to the Nazi bombing of the Basque town of Guernica during the Spanish Civil War.", description_ko:"「게르니카」는 스페인 내전 당시 나치 독일 공군의 폭격에 분노한 피카소가 그린 강렬한 반전 작품입니다. 고통에 울부짖는 인물들이 흑백의 색채와 입체파 표현으로 전쟁의 참혹함을 고발합니다." },
      { id:11, title:"The Last Supper", title_ko:"최후의 만찬", artist_display:"Leonardo da Vinci\nItalian, 1452–1519", date_display:"c. 1495–1498", medium_display:"Tempera on gesso", place_of_origin:"Italy", ratio:"l", ratio:"l", image_file:"12_last_supper.jpg", collection:"Santa Maria delle Grazie, Milan", description_en:"The Last Supper depicts the moment Jesus announces that one of his apostles will betray him. The dramatic reactions of the twelve apostles are rendered with extraordinary psychological depth.", description_ko:"「최후의 만찬」은 예수가 배신자가 있다고 선언하는 순간을 담은 레오나르도의 걸작입니다. 충격과 혼란에 휩싸인 각 제자들의 표정과 몸짓이 탁월한 심리 묘사로 생생하게 표현되어 있습니다." },
      { id:12, title:"A Sunday on La Grande Jatte", title_ko:"그랑자트 섬의 일요일 오후", artist_display:"Georges Seurat\nFrench, 1859–1891", date_display:"1884–1886", medium_display:"Oil on canvas", place_of_origin:"France", ratio:"l", ratio:"l", image_file:"13_grande_jatte.jpg", collection:"Art Institute of Chicago", description_en:"The masterpiece of pointillism — tiny dots of color create a shimmering, luminous surface depicting Parisians relaxing by the Seine.", description_ko:"「그랑자트 섬의 일요일 오후」는 점묘법의 걸작입니다. 무수한 색점들로 만들어진 빛나는 색채와 고요한 분위기가 인상적이며, 신인상주의 탄생을 알리는 기념비적 작품입니다." },
      { id:13, title:"Impression, Sunrise", title_ko:"인상, 해돋이", artist_display:"Claude Monet\nFrench, 1840–1926", date_display:"1872", medium_display:"Oil on canvas", place_of_origin:"France", ratio:"l", ratio:"l", image_file:"14_impression_sunrise.jpg", collection:"Musée Marmottan Monet, Paris", description_en:"This painting gave the Impressionist movement its name. The hazy harbor scene was initially criticized but came to define a revolutionary approach to painting.", description_ko:"「인상, 해돋이」는 이 그림에서 \'인상주의\'라는 명칭이 유래한 역사적 작품입니다. 르아브르 항구의 새벽 풍경을 빠른 붓질로 포착해 처음에는 비판받았지만, 회화의 혁명을 알리는 서막이 되었습니다." },
      { id:14, title:"The Creation of Adam", title_ko:"아담의 창조", artist_display:"Michelangelo\nItalian, 1475–1564", date_display:"c. 1508–1512", medium_display:"Fresco", place_of_origin:"Italy", ratio:"l", ratio:"l", image_file:"15_creation_of_adam.jpg", collection:"Sistine Chapel, Vatican City", description_en:"Part of the Sistine Chapel ceiling, The Creation of Adam features the almost-touching fingers of God and Adam, one of the most iconic images in Western art.", description_ko:"「아담의 창조」는 시스티나 성당 천장화 중 가장 유명한 장면입니다. 하나님과 아담의 손이 닿을 듯 마주하는 장면은 서양 미술 역사상 가장 상징적인 이미지가 되었습니다." },
      { id:15, title:"Arnolfini Portrait", title_ko:"아르놀피니 부부의 초상", artist_display:"Jan van Eyck\nFlemish, c. 1390–1441", date_display:"1434", medium_display:"Oil on oak panel", place_of_origin:"Belgium", ratio:"p", ratio:"p", image_file:"16_arnolfini.jpg", collection:"National Gallery, London", description_en:"The Arnolfini Portrait is a double portrait famous for its astonishing detail and symbolic richness. The convex mirror in the background reflects the entire room.", description_ko:"「아르놀피니 부부의 초상」은 놀라운 세밀함과 상징성으로 유명한 플랑드르 회화의 걸작입니다. 배경의 볼록 거울에 방 전체가 반영되어 있으며, 초기 유화 기법의 정수를 보여줍니다." },

      { id:17, title:"The Scream", title_ko:"절규", artist_display:"Edvard Munch\nNorwegian, 1863–1944", date_display:"1893", medium_display:"Oil, tempera and pastel on cardboard", place_of_origin:"Norway", ratio:"p", ratio:"p", image_file:"19_scream.jpg", collection:"National Gallery, Oslo", description_en:"The Scream is one of the most iconic images in art history. The agonized figure against a swirling orange sky expresses a profound sense of existential dread and anxiety.", description_ko:"「절규」는 미술사에서 가장 상징적인 이미지 중 하나입니다. 소용돌이치는 붉은 하늘 아래 괴로움에 가득 찬 인물의 표정은 인간의 실존적 불안과 공포를 강렬하게 표현합니다." },
      { id:18, title:"The Potato Eaters", title_ko:"감자 먹는 사람들", artist_display:"Vincent van Gogh\nDutch, 1853–1890", date_display:"1885", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"l", ratio:"l", image_file:"22_potato_eaters.jpg", collection:"Van Gogh Museum, Amsterdam", description_en:"The Potato Eaters is Van Gogh\'s first major work, depicting peasants sharing a meal by lamplight. The dark, earthy tones reflect the harsh reality of rural life.", description_ko:"「감자 먹는 사람들」은 반 고흐의 첫 번째 주요 작품입니다. 램프 불빛 아래 식사를 나누는 농민들의 모습을 어둡고 거친 색채로 담아 농촌의 고된 삶을 사실적으로 표현했습니다." },
      { id:19, title:"Olympia", title_ko:"올랭피아", artist_display:"Édouard Manet\nFrench, 1832–1883", date_display:"1863", medium_display:"Oil on canvas", place_of_origin:"France", ratio:"l", ratio:"l", image_file:"24_olympia.jpg", collection:"Musée d\'Orsay, Paris", description_en:"Olympia caused a scandal when exhibited in 1865. Manet\'s direct and unidealized depiction of a nude woman challenged academic conventions and paved the way for modern art.", description_ko:"「올랭피아」는 1865년 전시 당시 엄청난 스캔들을 일으켰습니다. 마네의 직접적이고 이상화되지 않은 누드 표현은 학문적 관습에 도전하며 현대 미술의 길을 열었습니다." },
      { id:20, title:"Venus of Urbino", title_ko:"우르비노의 비너스", artist_display:"Titian\nItalian, c. 1488–1576", date_display:"1534", medium_display:"Oil on canvas", place_of_origin:"Italy", ratio:"l", ratio:"l", image_file:"25_venus_urbino.jpg", collection:"Uffizi Gallery, Florence", description_en:"The Venus of Urbino is one of the most celebrated nudes in Western art. Titian\'s sensuous portrayal of the reclining Venus became the model for countless subsequent depictions of the female nude.", description_ko:"「우르비노의 비너스」는 서양 미술에서 가장 유명한 누드화 중 하나입니다. 티치아노의 관능적인 비너스 묘사는 이후 수많은 누드화의 원형이 되었습니다." },
      { id:21, title:"The Milkmaid", title_ko:"우유 따르는 여인", artist_display:"Johannes Vermeer\nDutch, 1632–1675", date_display:"c. 1657–1658", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"p", ratio:"p", image_file:"26_vermeer_milkmaid.jpg", collection:"Rijksmuseum, Amsterdam", description_en:"The Milkmaid depicts a kitchen maid carefully pouring milk. Vermeer\'s mastery of light transforms this everyday domestic scene into a timeless meditation on quiet labor.", description_ko:"「우유 따르는 여인」은 부엌 하녀가 우유를 따르는 장면을 묘사합니다. 베르메르 특유의 빛 표현이 일상적인 장면을 영원한 아름다움으로 승화시켰습니다." },
      { id:22, title:"The Anatomy Lesson of Dr. Nicolaes Tulp", title_ko:"니콜라스 튈프 박사의 해부학 강의", artist_display:"Rembrandt van Rijn\nDutch, 1606–1669", date_display:"1632", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"l", ratio:"l", image_file:"27_anatomy.jpg", collection:"Mauritshuis, The Hague", description_en:"This early masterpiece by Rembrandt depicts Dr. Nicolaes Tulp demonstrating the musculature of the arm to a group of surgeons, combining portraiture with scientific inquiry.", description_ko:"「니콜라스 튈프 박사의 해부학 강의」는 렘브란트의 초기 걸작입니다. 외과의사들에게 팔의 근육 구조를 시연하는 장면을 담아 초상화와 과학적 탐구를 결합한 혁신적인 작품입니다." },
      { id:23, title:"Adam and Eve", title_ko:"아담과 이브", artist_display:"Peter Paul Rubens\nFlemish, 1577–1640", date_display:"c. 1628–1629", medium_display:"Oil on canvas", place_of_origin:"Belgium", ratio:"p", ratio:"p", image_file:"28_rubens_adam_eve.jpg", collection:"Museo del Prado, Madrid", description_en:"Rubens depicts Adam and Eve at the moment of temptation in the Garden of Eden, showcasing his characteristic use of rich color and dynamic composition.", description_ko:"「아담과 이브」는 에덴동산에서의 유혹 장면을 묘사한 루벤스의 작품입니다. 루벤스 특유의 풍부한 색채와 역동적인 구도가 돋보이는 바로크 미술의 걸작입니다." },
      { id:24, title:"Starry Night Over the Rhône", title_ko:"론 강의 별이 빛나는 밤", artist_display:"Vincent van Gogh\nDutch, 1853–1890", date_display:"1888", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"l", ratio:"l", image_file:"30_starry_night_rhone.jpg", collection:"Musée d\'Orsay, Paris", description_en:"Painted a year before the more famous Starry Night, this work shows the gas lighting of Arles reflected in the Rhône River under a night sky filled with stars.", description_ko:"「론 강의 별이 빛나는 밤」은 유명한 별이 빛나는 밤보다 1년 앞서 그려진 작품입니다. 아를 시의 가스등이 론 강에 반사되는 야경을 별빛 가득한 하늘 아래 담아냈습니다." },
      { id:25, title:"Self-Portrait", title_ko:"자화상", artist_display:"Rembrandt van Rijn\nDutch, 1606–1669", date_display:"c. 1659", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"p", ratio:"p", image_file:"32_rembrandt_self.jpg", collection:"National Gallery of Art, Washington D.C.", description_en:"One of Rembrandt\'s many self-portraits, painted near the end of his life. His unflinching gaze and masterful use of light reveal the psychological depth of a man who has weathered great hardship.", description_ko:"「자화상」은 렘브란트가 말년에 그린 자화상 중 하나입니다. 흔들림 없는 시선과 빛의 탁월한 표현으로 많은 고난을 견뎌온 한 인간의 내면 깊이를 드러냅니다. 렘브란트는 평생 100점 이상의 자화상을 남겼습니다." },
      { id:26, title:"The Tower of Babel", title_ko:"바벨탑", artist_display:"Pieter Bruegel the Elder\nFlemish, c. 1525–1569", date_display:"1563", medium_display:"Oil on panel", place_of_origin:"Belgium", ratio:"l", ratio:"l", image_file:"37_bruegel_tower.jpg", collection:"Kunsthistorisches Museum, Vienna", description_en:"The Tower of Babel depicts the biblical story of humanity\'s attempt to build a tower reaching heaven. Bruegel\'s panoramic vision and extraordinary detail make this one of the most ambitious paintings of the Northern Renaissance.", description_ko:"「바벨탑」은 인류가 하늘에 닿는 탑을 쌓으려 했다는 성경 이야기를 담은 브뤼헐의 걸작입니다. 광대한 파노라마 구성과 놀라운 세부 묘사로 북방 르네상스에서 가장 야심찬 작품 중 하나로 꼽힙니다." },
      { id:27, title:"The Kiss", title_ko:"키스", artist_display:"Gustav Klimt\nAustrian, 1862–1918", date_display:"1907–1908", medium_display:"Oil and gold leaf on canvas", place_of_origin:"Austria", ratio:"p", ratio:"p", image_file:"38_klimt_kiss.jpg", collection:"Österreichische Galerie Belvedere, Vienna", description_en:"The Kiss is Klimt\'s most celebrated work, depicting a couple locked in an embrace, surrounded by golden robes. The lavish use of gold leaf reflects the influence of Byzantine mosaics and marks the pinnacle of his Golden Phase.", description_ko:"「키스」는 클림트의 가장 유명한 작품으로, 황금빛 옷에 감싸인 채 포옹하는 연인을 묘사합니다. 금박의 화려한 사용은 비잔틴 모자이크의 영향을 반영하며 그의 황금 시대의 절정을 보여줍니다." },
      { id:28, title:"Nighthawks", title_ko:"밤을 지새우는 사람들", artist_display:"Edward Hopper\nAmerican, 1882–1967", date_display:"1942", medium_display:"Oil on canvas", place_of_origin:"United States", ratio:"l", ratio:"l", image_file:"47_hopper_nighthawks.jpg", collection:"Art Institute of Chicago", description_en:"Nighthawks is one of the most recognized paintings in American art. The scene of isolated figures in a late-night diner evokes a profound sense of urban loneliness and alienation.", description_ko:"「밤을 지새우는 사람들」은 미국 미술에서 가장 유명한 작품 중 하나입니다. 심야 식당에 모인 고립된 인물들의 장면은 도시적 고독과 소외감을 깊이 있게 표현합니다. 호퍼는 이 작품을 통해 현대 도시 생활의 쓸쓸함을 탁월하게 포착했습니다." },
      { id:29, title:"The Third of May 1808", title_ko:"1808년 5월 3일", artist_display:"Francisco Goya\nSpanish, 1746–1828", date_display:"1814", medium_display:"Oil on canvas", place_of_origin:"Spain", ratio:"l", ratio:"l", image_file:"58_goya_third_may.jpg", collection:"Museo del Prado, Madrid", description_en:"Goya\'s masterpiece depicts the execution of Spanish civilians by Napoleon\'s soldiers. The luminous white shirt of the central figure has become one of art history\'s most powerful symbols of resistance.", description_ko:"「1808년 5월 3일」은 나폴레옹 군대에 의한 스페인 시민 처형 장면을 담은 고야의 걸작입니다. 중앙 인물의 흰 셔츠는 저항의 상징으로 미술사에서 가장 강렬한 이미지 중 하나가 되었습니다." },
      { id:30, title:"Wheat Field with Cypresses", title_ko:"사이프러스가 있는 밀밭", artist_display:"Vincent van Gogh\nDutch, 1853–1890", date_display:"1889", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"l", ratio:"l", image_file:"met_436535.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"Painted during Van Gogh\'s stay at Saint-Paul-de-Mausole asylum, this work captures the turbulent energy of the Provençal landscape with swirling brushstrokes and vivid color.", description_ko:"「사이프러스가 있는 밀밭」은 반 고흐가 생 폴 드 무졸 요양원에 머물던 시기에 그린 작품입니다. 소용돌이치는 붓 터치와 선명한 색채로 프로방스 풍경의 역동적인 에너지를 포착했습니다." },
      { id:31, title:"The Dance Class", title_ko:"무용 수업", artist_display:"Edgar Degas\nFrench, 1834–1917", date_display:"1874", medium_display:"Oil on canvas", place_of_origin:"France", ratio:"p", ratio:"p", image_file:"met_438817.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"Degas was fascinated by ballet, and The Dance Class is one of his finest works on the subject. The scene captures young dancers rehearsing under the watchful eye of their instructor.", description_ko:"「무용 수업」은 드가가 발레에 매료되어 그린 걸작 중 하나입니다. 스승의 지도 아래 연습하는 어린 무용수들의 모습을 생생하게 포착했으며, 무대 뒤 무용수들의 일상을 섬세하게 담아냈습니다." },
      { id:32, title:"Cypresses", title_ko:"사이프러스", artist_display:"Vincent van Gogh\nDutch, 1853–1890", date_display:"1889", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"p", ratio:"p", image_file:"met_437980.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"Van Gogh wrote about his fascination with cypresses, calling them beautiful in line and proportion. This monumental work captures the flame-like energy of the trees against a turbulent sky.", description_ko:"「사이프러스」는 반 고흐가 사이프러스 나무의 아름다움에 매료되어 그린 작품입니다. 불꽃처럼 솟아오른 나무들과 소용돌이치는 하늘이 강렬한 생명력을 표현합니다." },
      { id:33, title:"Sunflowers", title_ko:"해바라기", artist_display:"Vincent van Gogh\nDutch, 1853–1890", date_display:"1887", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"l", ratio:"l", image_file:"met_436524.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"Van Gogh\'s sunflower series is among the most celebrated in art history. This version, painted in Paris, shows flowers in various stages of bloom, exploring themes of life and decay.", description_ko:"반 고흐의 해바라기 연작은 미술사에서 가장 유명한 시리즈 중 하나입니다. 파리에서 그린 이 버전은 다양한 개화 단계의 꽃을 보여주며 생명과 쇠퇴의 주제를 탐구합니다." },
      { id:34, title:"Irises", title_ko:"붓꽃", artist_display:"Vincent van Gogh\nDutch, 1853–1890", date_display:"1890", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"l", ratio:"l", image_file:"met_436528.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"Painted in the garden of the Saint-Paul asylum, Van Gogh\'s Irises displays his characteristic bold outlines and vibrant colors. The painting was created just a month before his death.", description_ko:"「붓꽃」은 반 고흐가 생 폴 요양원 정원에서 그린 작품으로, 그의 특유의 대담한 윤곽선과 선명한 색채가 돋보입니다. 사망 한 달 전에 제작된 이 작품은 그의 마지막 걸작 중 하나입니다." },
      { id:35, title:"Self-Portrait with a Straw Hat", title_ko:"밀짚모자를 쓴 자화상", artist_display:"Vincent van Gogh\nDutch, 1853–1890", date_display:"1887", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"p", ratio:"p", image_file:"met_436532.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"This self-portrait from Van Gogh\'s Paris period shows the influence of Impressionism on his style. The loose, colorful brushwork marks a significant departure from his earlier, darker palette.", description_ko:"파리 시기에 그린 이 자화상은 인상주의가 반 고흐의 화풍에 미친 영향을 보여줍니다. 자유롭고 화려한 붓 터치는 초기의 어두운 색채에서 크게 벗어난 모습을 보여줍니다." },
      { id:36, title:"Young Woman with a Water Pitcher", title_ko:"물 주전자를 든 젊은 여인", artist_display:"Johannes Vermeer\nDutch, 1632–1675", date_display:"c. 1662", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"p", ratio:"p", image_file:"met_437881.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"This intimate domestic scene exemplifies Vermeer\'s mastery of light. The soft light streaming through the window illuminates the woman\'s face and the objects around her with extraordinary delicacy.", description_ko:"이 친밀한 가정적 장면은 베르메르의 빛 묘사의 탁월함을 보여줍니다. 창문으로 스며드는 부드러운 빛이 여인의 얼굴과 주변 사물들을 섬세하게 비추는 모습이 인상적입니다." },
      { id:37, title:"Aristotle with a Bust of Homer", title_ko:"호메로스 흉상을 바라보는 아리스토텔레스", artist_display:"Rembrandt van Rijn\nDutch, 1606–1669", date_display:"1653", medium_display:"Oil on canvas", place_of_origin:"Netherlands", ratio:"p", ratio:"p", image_file:"met_437394.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"One of Rembrandt\'s most celebrated works, this painting shows the philosopher Aristotle contemplating a bust of Homer. The golden chain around his neck represents worldly success, while his pensive expression suggests deeper philosophical reflection.", description_ko:"「호메로스 흉상을 바라보는 아리스토텔레스」는 렘브란트의 가장 유명한 작품 중 하나입니다. 철학자 아리스토텔레스가 호메로스의 흉상을 명상하는 장면으로, 세속적 성공과 철학적 사색 사이의 긴장을 표현합니다." },
      { id:38, title:"The Harvesters", title_ko:"추수하는 사람들", artist_display:"Pieter Bruegel the Elder\nFlemish, c. 1525–1569", date_display:"1565", medium_display:"Oil on panel", place_of_origin:"Belgium", ratio:"l", ratio:"l", image_file:"met_435809.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"The Harvesters is one of Bruegel\'s famous series depicting the months of the year. This August scene shows peasants resting in the shade of a pear tree during the summer harvest.", description_ko:"「추수하는 사람들」은 브뤼헐의 유명한 계절 연작 중 하나입니다. 8월의 장면으로, 여름 추수철에 배나무 그늘 아래 쉬고 있는 농민들의 모습을 생동감 있게 담았습니다." },
      { id:39, title:"Steamboats in the Port of Rouen", title_ko:"루앙 항구의 증기선", artist_display:"Camille Pissarro\nFrench, 1830–1903", date_display:"1896", medium_display:"Oil on canvas", place_of_origin:"France", ratio:"l", ratio:"l", image_file:"met_437309.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"Pissarro captures the industrial vitality of the port of Rouen with his characteristic Impressionist brushwork. The scene balances the modern world of steamships with the shimmering light on the water.", description_ko:"피사로는 인상주의 특유의 붓 터치로 루앙 항구의 산업적 활기를 포착했습니다. 증기선이 오가는 현대적 풍경과 수면에 반짝이는 빛이 조화를 이루는 작품입니다." },
      { id:40, title:"Erasmus of Rotterdam", title_ko:"로테르담의 에라스무스", artist_display:"Hans Holbein the Younger\nGerman, 1497–1543", date_display:"1523", medium_display:"Oil on panel", place_of_origin:"Germany", ratio:"p", ratio:"p", image_file:"met_459080.jpg", collection:"Metropolitan Museum of Art, New York", description_en:"Holbein\'s portrait of the great Renaissance humanist Erasmus is one of the most celebrated portraits of the 16th century. The scholar is shown writing, capturing his intellectual essence.", description_ko:"홀바인이 그린 르네상스 인문주의자 에라스무스의 초상화는 16세기 가장 유명한 초상화 중 하나입니다. 글을 쓰고 있는 학자의 모습에서 그의 지적 본질이 잘 드러납니다." },

    // ── 전체 무작위 셔플 (방문할 때마다 다른 순서) ──
    function getTodaysShuffle() {
      const arr = [...ARTWORKS_DB];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr; // 전체 반환 (10개 제한 없음)
    }

    async function fetchArtworks() {
      return getTodaysShuffle();
    }

    // ── 이미지 URL: GitHub raw (로컬 하드 절약) ──
    const GITHUB_RAW = 'https://raw.githubusercontent.com/jeonjunha-design/daily-dapp-web/main/images/';
    function imageUrl(artwork) {
      return GITHUB_RAW + artwork.image_file;
    }

    // ── 재료/기법 한국어 변환 매핑 ──
    const mediumKoMap = {
      'oil on canvas': '캔버스에 유화',
      'oil on panel': '패널에 유화',
      'watercolor': '수채화',
      'watercolor on paper': '종이에 수채화',
      'pencil on paper': '종이에 연필',
      'charcoal on paper': '종이에 목탄',
      'ink on paper': '종이에 잉크',
      'engraving': '판화 (에칭)',
      'etching': '에칭',
      'lithograph': '석판화',
      'woodcut': '목판화',
      'tempera on panel': '패널에 템페라',
      'fresco': '프레스코',
      'pastel on paper': '종이에 파스텔',
      'gouache': '과슈',
      'acrylic': '아크릴화',
      'bronze': '청동',
      'marble': '대리석',
      'ceramic': '도자기',
      'photograph': '사진',
      'silver gelatin print': '젤라틴 실버 프린트',
    };

    function translateMedium(medium) {
      if (!medium) return null;
      const lower = medium.toLowerCase().split(';')[0].trim();
      for (const [en, ko] of Object.entries(mediumKoMap)) {
        if (lower.includes(en)) return ko;
      }
      return null; // 매핑 없으면 원문 사용
    }

    // ── 해설 텍스트 생성 ──
    function buildDescription(artwork, lang) {
      const artist = artwork.artist_display ? artwork.artist_display.split('\n')[0].trim() : '';
      const artistOrigin = artwork.artist_display && artwork.artist_display.includes('\n')
        ? artwork.artist_display.split('\n').slice(1).join(', ').trim() : '';
      const date = artwork.date_display || '';
      const medium = artwork.medium_display || '';
      const origin = artwork.place_of_origin || '';
      const title = artwork.title || '';
      const englishDesc = stripHtml(artwork.description || artwork.short_description || '');

      if (lang === 'en') {
        // 영어는 API 원문 우선, 없으면 자동 생성
        if (englishDesc) return englishDesc;
        let desc = `"${title}"`;
        if (artist) desc += ` is a work by ${artist}`;
        if (artistOrigin) desc += ` (${artistOrigin})`;
        if (date) desc += `, created around ${date}.`;
        else desc += '.';
        if (medium) desc += ` The work was made using ${medium}.`;
        if (origin) desc += ` It originates from ${origin}.`;
        desc += ' This piece is part of the public domain collection at the Art Institute of Chicago.';
        return desc;
      }

      // ── 한국어: 메타데이터로 풍부한 해설 자동 생성 ──
      const koMedium = translateMedium(medium);
      const mediumText = koMedium || (medium ? medium.split(';')[0].trim() : '');

      let parts = [];

      // 1문장: 작품 소개
      let intro = `「${title}」은(는)`;
      if (artist) intro += ` ${artist}`;
      if (artistOrigin) intro += `(${artistOrigin})`;
      intro += '의 작품입니다.';
      parts.push(intro);

      // 2문장: 제작 시기 및 기법
      let technique = '';
      if (date && mediumText) {
        technique = `${date}년경에 ${mediumText} 기법으로 제작되었으며,`;
      } else if (date) {
        technique = `${date}년경에 제작되었으며,`;
      } else if (mediumText) {
        technique = `${mediumText} 기법으로 제작된 이 작품은`;
      }
      if (technique) parts.push(technique);

      // 3문장: 출신/지역 맥락
      if (origin) {
        parts.push(`${origin}의 예술적 전통과 감성을 담고 있습니다.`);
      } else {
        parts.push('당대의 미적 감각과 예술적 정수를 담고 있습니다.');
      }

      // 4문장: 소장 정보
      parts.push('현재 미국 시카고 미술관(Art Institute of Chicago)에 소장된 공공 도메인 작품입니다.');

      return parts.join(' ');
    }

    // ── 작품 렌더링 ──
    function renderArtwork(artwork) {
      currentArtwork = artwork;
      const t = i18n[currentLang];
      const infoBar = document.getElementById('infoBar');
      const errorBox = document.getElementById('errorBox');
      const imgSkeleton = document.getElementById('imgSkeleton');
      const artImage = document.getElementById('artImage');

      // 초기화
      infoBar.classList.add('hidden');
      errorBox.classList.remove('show');
      imgSkeleton.classList.remove('hidden');
      artImage.classList.add('hidden');

      // TTS 중지
      stopTTS();

      // 제목
      document.getElementById('artTitle').textContent =
        (currentLang === 'ko' && artwork.title_ko) ? artwork.title_ko : (artwork.title || '—');

      // 작가
      const artistName = artwork.artist_display
        ? artwork.artist_display.split('\n')[0]
        : (currentLang === 'ko' ? '작가 미상' : 'Unknown Artist');
      document.getElementById('artArtist').textContent = artistName;

      // 날짜
      document.getElementById('artDate').textContent = artwork.date_display || '';

      // 재료
      const medEl = document.getElementById('artMedium');
      if (artwork.medium_display) {
        const mediumText = currentLang === 'ko'
          ? (translateMedium(artwork.medium_display) || artwork.medium_display.split(';')[0])
          : artwork.medium_display.split(';')[0];
        medEl.textContent = mediumText;
        medEl.style.display = '';
      } else {
        medEl.style.display = 'none';
      }

      // 네비 버튼 항상 활성화 (순환)
      document.getElementById('prevBtn').disabled = false;
      document.getElementById('nextBtn').disabled = false;

      // TTS 초기화
      document.getElementById('ttsBtn').textContent = '▶';
      document.getElementById('ttsBtn').classList.remove('playing');
      document.getElementById('ttsBar').style.width = '0%';

      // 이미지 로드 - 번쩍임 방지: 새 이미지 먼저 로드 후 교체
      const img = document.getElementById('artImage');
      img.alt = artwork.title || '';
      const newSrc = imageUrl(artwork);

      if (img.src.endsWith(newSrc) || img.src === newSrc) {
        imgSkeleton.classList.add('hidden');
        img.classList.remove('hidden');
        infoBar.classList.remove('hidden');
        return;
      }

      const preloader = new Image();
      preloader.onload = () => {
        img.src = newSrc;
        imgSkeleton.classList.add('hidden');
        img.classList.remove('hidden');
        infoBar.classList.remove('hidden');

        const fsModal = document.getElementById('fullscreenModal');
        const isFullscreen = fsModal && fsModal.classList.contains('show');
        if (isFullscreen) {
          document.getElementById('fullscreenImg').src = newSrc;
          const title = (currentLang === 'ko' && artwork.title_ko) ? artwork.title_ko : (artwork.title || '');
          const artist = artwork.artist_display ? artwork.artist_display.split('\n')[0] : '';
          const date = artwork.date_display || '';
          const desc = currentLang === 'ko'
            ? (artwork.description_ko || buildDescription(artwork, 'ko'))
            : (artwork.description_en || buildDescription(artwork, 'en'));
          document.getElementById('fsTitle').textContent = title;
          document.getElementById('fsMeta').textContent = [artist, date].filter(Boolean).join(' · ');
          document.getElementById('fsDesc').textContent = desc;
        }
      };
      preloader.onerror = () => {
        imgSkeleton.classList.add('hidden');
        infoBar.classList.remove('hidden');
      };
      preloader.src = newSrc;
    }

    // ── TTS ──
    function stopTTS() {
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      ttsPlaying = false;
      clearInterval(ttsProgressTimer);
      const btn = document.getElementById('ttsBtn');
      if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
      const bar = document.getElementById('ttsBar');
      if (bar) bar.style.width = '0%';
    }

    // ── 최적 한국어 목소리 찾기 ──
    let bestVoice = null;
    function findBestVoice(lang) {
      const voices = window.speechSynthesis.getVoices();
      const langCode = lang === 'ko' ? 'ko' : 'en';
      
      // 우선순위: Google > Microsoft > 기타
      const preferred = voices.filter(v => v.lang.startsWith(langCode));
      const google = preferred.find(v => v.name.includes('Google'));
      const microsoft = preferred.find(v => v.name.includes('Microsoft'));
      return google || microsoft || preferred[0] || null;
    }

    // ── 텍스트 자연스럽게 전처리 ──
    function preprocessText(text, lang) {
      if (lang === 'ko') {
        return text
          .replace(/「/g, '').replace(/」/g, '')       // 낫표 제거
          .replace(/\d{4}[-–]\d{4}/g, '')              // 연도 범위 제거 (1853–1890)
          .replace(/c\.\s*\d{4}[-–]\d{4}/g, '')        // c. 1503–1519 제거
          .replace(/c\.\s*\d{4}/g, '')                  // c. 1665 제거
          .replace(/\(\s*,?\s*\)/g, '')                 // 빈 괄호 제거
          .replace(/\(/g, ', ').replace(/\)/g, ', ')    // 괄호 → 쉼표
          .replace(/,\s*,/g, ',')                       // 중복 쉼표 제거
          .replace(/\s+/g, ' ')
          .trim();
      }
      // 영어도 연도 범위는 자연스럽게 읽힘 - 그대로 유지
      return text.replace(/\s+/g, ' ').trim();
    }

    function startTTS() {
      if (!window.speechSynthesis) return;

      const artwork = currentArtwork || artworks[currentIndex];
      const desc = buildDescription(artwork, currentLang);
      const titleText = (currentLang === 'ko' && artwork.title_ko) ? artwork.title_ko : (artwork.title || '');
      const artistText = artwork.artist_display ? artwork.artist_display.split('\n')[0] : '';

      const rawText = currentLang === 'ko'
        ? `${titleText}. ${artistText}. ${desc}`
        : `${titleText}, by ${artistText}. ${desc}`;

      const fullText = preprocessText(rawText, currentLang);

      window.speechSynthesis.cancel();
      ttsUtterance = new SpeechSynthesisUtterance(fullText);
      ttsUtterance.lang = currentLang === 'ko' ? 'ko-KR' : 'en-US';
      ttsUtterance.rate = currentLang === 'ko' ? 0.9 : 0.95; // 한국어는 살짝 느리게
      ttsUtterance.pitch = 1.0;
      ttsUtterance.volume = 1.0;

      // 최적 목소리 적용
      const voice = findBestVoice(currentLang);
      if (voice) ttsUtterance.voice = voice;

      ttsUtterance.onstart = () => {
        ttsPlaying = true;
        document.getElementById('ttsBtn').textContent = '⏸';
        document.getElementById('ttsBtn').classList.add('playing');
        ttsStartTime = Date.now();
        ttsDuration = (fullText.length / 4.5) * (1000 / (currentLang === 'ko' ? 0.9 : 0.95));
        clearInterval(ttsProgressTimer);
        ttsProgressTimer = setInterval(() => {
          const elapsed = Date.now() - ttsStartTime;
          const pct = Math.min((elapsed / ttsDuration) * 100, 99);
          document.getElementById('ttsBar').style.width = pct + '%';
        }, 200);
      };

      ttsUtterance.onend = () => {
        ttsPlaying = false;
        clearInterval(ttsProgressTimer);
        document.getElementById('ttsBtn').textContent = '▶';
        document.getElementById('ttsBtn').classList.remove('playing');
        document.getElementById('ttsBar').style.width = '100%';
        setTimeout(() => {
          document.getElementById('ttsBar').style.width = '0%';
          currentArtwork = navigateOriented(1);
          renderArtwork(currentArtwork);
          setTimeout(() => startTTS(), 1000);
        }, 800);
      };

      ttsUtterance.onerror = () => {
        ttsPlaying = false;
        clearInterval(ttsProgressTimer);
        document.getElementById('ttsBtn').textContent = '▶';
        document.getElementById('ttsBtn').classList.remove('playing');
      };

      // 목소리 로드 대기 후 재생
      if (window.speechSynthesis.getVoices().length === 0) {
        window.speechSynthesis.onvoiceschanged = () => {
          const voice = findBestVoice(currentLang);
          if (voice) ttsUtterance.voice = voice;
          window.speechSynthesis.speak(ttsUtterance);
        };
      } else {
        window.speechSynthesis.speak(ttsUtterance);
      }
    }

    // ── UI 텍스트 갱신 ──
    function applyLang() {
      const t = i18n[currentLang];
      document.getElementById('langToggle').textContent = t.langBtn;
      document.getElementById('backLabel').textContent = t.back;
      document.getElementById('dateBadge').textContent = `🎨 ${t.badgePrefix} · ${getTodayString(currentLang)}`;
      document.documentElement.lang = currentLang;
      if (artworks.length > 0) renderArtwork(artworks[currentIndex]);
      try { localStorage.setItem('daily_lang', currentLang); } catch(e) {}
    }

    // ── 초기 로드 ──
    async function init() {
      // 언어 초기화
      const params = new URLSearchParams(location.search);
      const saved = (() => { try { return localStorage.getItem('daily_lang'); } catch(e) { return null; } })();
      currentLang = params.get('lang') || saved || 'ko';

      applyLang();

      const t = i18n[currentLang];
      document.getElementById('dateBadge').textContent = `🎨 ${t.loading}`;

      try {
        artworks = await fetchArtworks();
        if (!artworks.length) throw new Error('No artworks');
        currentIndex = 0;
        renderArtwork(artworks[currentIndex]);
        document.getElementById('dateBadge').textContent = `🎨 ${t.badgePrefix} · ${getTodayString(currentLang)}`;
        // 백그라운드에서 방향별 풀 구축
        setTimeout(() => buildOrientationPools(), 1000);
      } catch(err) {
        document.getElementById('imgSkeleton').classList.add('hidden');
        document.getElementById('errorBox').classList.add('show');
        document.getElementById('errorTitle').textContent = t.errTitle;
        document.getElementById('errorMsg').textContent = t.errMsg;
        document.getElementById('dateBadge').textContent = `🎨 ${t.badgePrefix}`;
      }
    }

    // ── 이벤트 바인딩 ──
    function bindEvents() {
      // 언어 전환
      document.getElementById('langToggle').onclick = () => {
        stopTTS();
        currentLang = currentLang === 'ko' ? 'en' : 'ko';
        applyLang();
      };

      // TTS 재생/일시정지
      document.getElementById('ttsBtn').onclick = () => {
        if (!window.speechSynthesis) return;
        if (ttsPlaying) {
          window.speechSynthesis.pause();
          ttsPlaying = false;
          clearInterval(ttsProgressTimer);
          document.getElementById('ttsBtn').textContent = '▶';
          document.getElementById('ttsBtn').classList.remove('playing');
        } else if (window.speechSynthesis.paused) {
          window.speechSynthesis.resume();
          ttsPlaying = true;
          document.getElementById('ttsBtn').textContent = '⏸';
          document.getElementById('ttsBtn').classList.add('playing');
          ttsProgressTimer = setInterval(() => {
            const elapsed = Date.now() - ttsStartTime;
            const pct = Math.min((elapsed / ttsDuration) * 100, 99);
            document.getElementById('ttsBar').style.width = pct + '%';
          }, 200);
        } else {
          startTTS();
        }
      };

      // 이전/다음 (방향별 풀 사용, TTS 항상 연속 재생)
      document.getElementById('prevBtn').onclick = () => {
        const wasPlaying = ttsPlaying;
        stopTTS();
        const art = navigateOriented(-1);
        renderArtwork(art);
        if (wasPlaying) setTimeout(() => startTTS(), 1000);
      };
      document.getElementById('nextBtn').onclick = () => {
        const wasPlaying = ttsPlaying;
        stopTTS();
        const art = navigateOriented(1);
        renderArtwork(art);
        if (wasPlaying) setTimeout(() => startTTS(), 1000);
      };

      // 전체화면 모달
      const modal = document.getElementById('fullscreenModal');
      const fullscreenImg = document.getElementById('fullscreenImg');
      const fsInfo = document.getElementById('fsInfo');
      let fsInfoVisible = true;

      function updateFsInfo(artwork) {
        const title = (currentLang === 'ko' && artwork.title_ko) ? artwork.title_ko : (artwork.title || '');
        const artist = artwork.artist_display ? artwork.artist_display.split('\n')[0] : '';
        const date = artwork.date_display || '';
        const desc = currentLang === 'ko'
          ? (artwork.description_ko || buildDescription(artwork, 'ko'))
          : (artwork.description_en || buildDescription(artwork, 'en'));
        document.getElementById('fsTitle').textContent = title;
        document.getElementById('fsMeta').textContent = [artist, date].filter(Boolean).join(' · ');
        document.getElementById('fsDesc').textContent = desc;
      }

      function showFsInfo() { fsInfoVisible = true; fsInfo.classList.remove('hidden'); }
      function hideFsInfo() { fsInfoVisible = false; fsInfo.classList.add('hidden'); }
      function toggleFsInfo() { fsInfoVisible ? hideFsInfo() : showFsInfo(); }

      function openFullscreen(src) {
        fullscreenImg.src = src;
        updateFsInfo(artworks[currentIndex]);
        showFsInfo();
        modal.classList.add('show');
        document.body.style.overflow = 'hidden';
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
      }

      function closeFullscreen() {
        modal.classList.remove('show');
        document.body.style.overflow = '';
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
      }

      function fullscreenNext() {
        stopTTS();
        const art = navigateOriented(1);
        renderArtwork(art);
        setTimeout(() => startTTS(), 1000);
      }

      function fullscreenPrev() {
        stopTTS();
        const art = navigateOriented(-1);
        renderArtwork(art);
        setTimeout(() => startTTS(), 1000);
      }

      // 이미지 클릭 → 전체화면 열기
      document.getElementById('artImage').onclick = () => {
        const src = document.getElementById('artImage').src;
        if (!src) return;
        openFullscreen(src);
      };

      // 전체화면 터치: 좌우 스와이프 → 작품전환 / 위아래 → 정보토글 / 탭 → 닫기
      let touchStartX = 0, touchStartY = 0, touchMoved = false;
      modal.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchMoved = false;
      }, { passive: true });
      modal.addEventListener('touchmove', () => {
        touchMoved = true;
      }, { passive: true });
      modal.addEventListener('touchend', (e) => {
        const dx = touchStartX - e.changedTouches[0].clientX;
        const dy = touchStartY - e.changedTouches[0].clientY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (!touchMoved || (absDx < 10 && absDy < 10)) {
          // 탭 → 닫기
          closeFullscreen();
        } else if (absDx > absDy && absDx > 40) {
          // 좌우 스와이프 → 작품 전환
          if (dx > 0) fullscreenNext(); else fullscreenPrev();
        } else if (absDy > 40) {
          // 위아래 스와이프 → 정보 토글
          if (dy > 0) showFsInfo(); else hideFsInfo();
        }
      }, { passive: true });

      // 키보드
      document.addEventListener('keydown', (e) => {
        const isFullscreen = modal.classList.contains('show');
        if (e.key === 'Escape') { closeFullscreen(); return; }
        if (isFullscreen) {
          // 전체화면에서 위아래 → 정보 토글
          if (e.key === 'ArrowUp') { showFsInfo(); return; }
          if (e.key === 'ArrowDown') { hideFsInfo(); return; }
        }
        if (e.key === 'ArrowLeft') {
          const wasPlaying = ttsPlaying;
          stopTTS();
          const art = navigateOriented(-1);
          renderArtwork(art);
          if (wasPlaying || isFullscreen) setTimeout(() => startTTS(), 1000);
        } else if (e.key === 'ArrowRight') {
          const wasPlaying = ttsPlaying;
          stopTTS();
          const art = navigateOriented(1);
          renderArtwork(art);
          if (wasPlaying || isFullscreen) setTimeout(() => startTTS(), 1000);
        }
      });
    }

    // ── 시작 ──
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => { bindEvents(); init(); });
    } else {
      bindEvents(); init();
    }

    // ── 방향별 네비게이션 ──
    function navigateOriented(dir) {
      const isFullscreen = document.getElementById('fullscreenModal').classList.contains('show');
      const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
      // 컴퓨터면 전체 풀
      if (!isMobile) {
        currentIndex = (currentIndex + dir + artworks.length) % artworks.length;
        return artworks[currentIndex];
      }
      const ori = getScreenOrientation();
      if (ori === 'portrait' && portraitPool.length > 0) {
        portraitIndex = (portraitIndex + dir + portraitPool.length) % portraitPool.length;
        return portraitPool[portraitIndex];
      } else if (ori === 'landscape' && landscapePool.length > 0) {
        landscapeIndex = (landscapeIndex + dir + landscapePool.length) % landscapePool.length;
        return landscapePool[landscapeIndex];
      }
      currentIndex = (currentIndex + dir + artworks.length) % artworks.length;
      return artworks[currentIndex];
    }

    // 화면 방향 바뀌면 첫 작품부터
    window.addEventListener('orientationchange', () => {
      setTimeout(() => {
        portraitIndex = 0;
        landscapeIndex = 0;
        const art = navigateOriented(0);
        renderArtwork(art);
      }, 300);
    });
    let portraitPool = [];   // 세로 이미지
    let landscapePool = []; // 가로 이미지
    let portraitIndex = 0;
    let landscapeIndex = 0;
    let orientationMode = null; // 'portrait' | 'landscape' | null

    // 이미지 비율 캐시
    const ratioCache = {};

    function getScreenOrientation() {
      return window.innerHeight > window.innerWidth ? 'portrait' : 'landscape';
    }

    // 현재 방향에 맞는 풀에서 작품 가져오기
    function getOrientedArtwork() {
      const ori = getScreenOrientation();
      const isMobile = window.innerWidth <= 900 || window.innerHeight <= 900;
      if (!isMobile) return artworks[currentIndex];

      if (ori === 'portrait') {
        if (portraitPool.length === 0) return artworks[currentIndex];
        const art = portraitPool[portraitIndex % portraitPool.length];
        portraitIndex++;
        return art;
      } else {
        if (landscapePool.length === 0) return artworks[currentIndex];
        const art = landscapePool[landscapeIndex % landscapePool.length];
        landscapeIndex++;
        return art;
      }
    }

    function buildOrientationPools() {
      portraitPool = artworks.filter(a => a.ratio === 'p');
      landscapePool = artworks.filter(a => a.ratio === 'l' || !a.ratio);
      for (let i = portraitPool.length-1; i>0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [portraitPool[i],portraitPool[j]] = [portraitPool[j],portraitPool[i]];
      }
      for (let i = landscapePool.length-1; i>0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [landscapePool[i],landscapePool[j]] = [landscapePool[j],landscapePool[i]];
      }
      console.log('풀 준비: 세로 ' + portraitPool.length + '개, 가로 ' + landscapePool.length + '개');
    }

        // ── 페이지 나갈 때 TTS 종료 ──
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopTTS();
    });
    window.addEventListener('pagehide', () => stopTTS());
    window.addEventListener('beforeunload', () => stopTTS());
  </script>
</body>
</html>
